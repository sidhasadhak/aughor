tables:
  analytics.attribution:
    auto_generated: true
    columns:
      channel:
        description: Marketing channel that contributed to the order.
        values: Email, Meta, Direct, Organic, Google, TikTok
      order_id:
        description: Unique identifier for the order being attributed.
      weight:
        caveats: Weights for a given order should sum to 1.0 across all channels.
        description: Attribution weight assigned to the channel for the order; likely
          represents the channel's contribution share (e.g., 0.5 = 50%).
    description: Stores marketing attribution weights for orders, indicating how much
      each channel contributed to each order.
    grain: One row per order-channel pair, representing the attribution weight assigned
      to that channel for the order.
  analytics.campaigns:
    auto_generated: true
    columns:
      budget_usd:
        description: Total budget allocated to the campaign in US dollars
      campaign_id:
        description: Unique identifier for each campaign
      campaign_name:
        description: Human-readable name of the campaign
        values: Clean Beauty 2024, Summer Radiance 2024, New You 2023, Holiday Edit
          2023, VIP Rewards 2024, Spring Glow 2023
      channel:
        description: Marketing channel used for the campaign
        values: Google, TikTok, Email, Meta
      end_date:
        description: Date the campaign ended
      start_date:
        description: Date the campaign started
    description: Stores information about marketing campaigns, including their name,
      channel, duration, and budget.
    grain: one row per campaign_id
  analytics.carts:
    auto_generated: true
    columns:
      abandoned:
        description: Whether the cart was not completed (i.e., no purchase followed)
        values: False, True
      cart_id:
        description: Unique identifier for a shopping cart
      created_date:
        description: Date the cart was created
      customer_id:
        description: Identifier for the customer associated with the cart
      device:
        description: Type of device used to create the cart
        values: desktop, mobile
      traffic_source:
        description: Marketing channel through which the customer arrived at the site
        values: Google, Organic, Direct, Meta, TikTok, Email
    description: Tracks individual shopping carts with metadata about the customer,
      traffic source, and device used, including whether the cart was abandoned.
    grain: one row per unique cart_id
  analytics.customers:
    auto_generated: true
    columns:
      acquisition_channel:
        description: Marketing channel through which the customer was acquired
        values: Google, TikTok, Organic, Referral, Meta, Email
      age_group:
        description: Customer's age range category
        values: 35-44, 18-24, 25-34, 45+
      country:
        description: Customer's country of residence (ISO 3166-1 alpha-2 codes)
        values: SG, GB, IT, FR, CA, AU, AE, KR, US
      customer_id:
        description: Unique identifier for each customer
      email:
        description: Customer's email address
      full_name:
        description: Customer's full name
      loyalty_tier:
        description: Customer's current loyalty program tier
        values: Bronze, Silver, Gold, Platinum
      marketing_opt_in:
        description: Whether the customer has opted in to receive marketing communications
        values: True, False
      middle_name:
        caveats: Column type INTEGER is likely incorrect for a name field; may indicate
          data quality issue or schema error
        description: Customer's middle name stored as integer (likely erroneous or
          placeholder)
      signup_date:
        description: Date the customer created their account
      skin_type:
        description: Customer's self-reported skin type
        values: Oily, Normal, Sensitive, Dry, Combination
    description: Customer master data table containing demographic, behavioral, and
      acquisition information for analytics purposes.
    grain: One row per unique customer_id
  analytics.inventory_movements:
    auto_generated: true
    columns:
      movement_date:
        description: Date when the movement occurred
      movement_id:
        description: Unique identifier for each inventory movement record
      movement_type:
        description: Type of inventory movement
        values: outbound, adjustment, inbound
      product_id:
        description: Identifier for the product involved in the movement
      quantity:
        description: Number of units moved; positive for inbound/adjustments increasing
          stock, negative or positive depending on business logic for outbound
      warehouse:
        description: The warehouse where the movement occurred
        values: Bayview, Hillcrest, Riverside
    description: Records individual inventory movements (inbound, outbound, or adjustments)
      across warehouses, tracking changes in stock quantities over time.
    grain: one row per inventory movement event
  analytics.inventory_snapshots:
    auto_generated: true
    columns:
      product_id:
        description: Unique identifier for the product
      snapshot_date:
        description: Date of the inventory snapshot
      stock_level:
        description: Quantity of the product in stock at the time of the snapshot
      warehouse:
        description: Warehouse location where the inventory is stored
        values: Riverside, Hillcrest, Bayview
    description: Daily inventory stock levels for products across multiple warehouses.
    grain: one row per product_id per warehouse per snapshot_date
  analytics.invoices:
    auto_generated: true
    columns:
      invoice_date:
        description: Date the invoice was issued
      invoice_id:
        description: Unique identifier for the invoice
      order_id:
        description: Identifier linking the invoice to its originating order
      revenue_net_usd:
        description: Net revenue amount in USD before tax and shipping
      shipping_usd:
        description: Shipping cost in USD for the invoice
      tax_usd:
        description: Tax amount in USD applied to the invoice
    description: Stores invoice-level financial details associated with orders, including
      net revenue, tax, and shipping costs in USD.
    grain: One row per invoice_id, representing a single invoice generated for an
      order.
  analytics.marketing_ledger:
    auto_generated: true
    columns:
      channel:
        description: Marketing channel through which the spend occurred
        values: Google, Meta, TikTok, Email
      clicks:
        description: Number of clicks on the ads
      impressions:
        description: Number of times ads were displayed
      ledger_id:
        description: Unique identifier for each ledger entry
      spend_date:
        description: Date on which the advertising spend occurred
      spend_usd:
        description: Total advertising spend in US dollars
    description: Daily advertising spend and performance metrics for marketing campaigns,
      broken down by channel.
    grain: one row per channel per spend_date
  analytics.order_items:
    auto_generated: true
    columns:
      line_cogs_usd:
        description: "Total cost of goods for this line (quantity \xD7 unit_cogs_usd)"
      line_revenue_usd:
        description: "Total revenue for this line (quantity \xD7 unit_price_usd)"
      order_id:
        description: Identifier linking the item to its parent order
      order_item_id:
        description: Unique identifier for each order item
      product_id:
        description: Identifier for the product included in this item
      quantity:
        description: Number of units of the product ordered
      traffic_source:
        description: Marketing channel through which the customer arrived
        values: Email, Direct, Organic, Google, Meta, TikTok
      unit_cogs_usd:
        description: Cost of goods sold per unit in USD
      unit_price_usd:
        description: Price per unit in USD at the time of order
    description: Contains individual line items from orders, capturing product details,
      pricing, cost of goods, and traffic source for revenue and margin analysis.
    grain: One row per order item (i.e., per product in an order)
  analytics.orders:
    auto_generated: true
    columns:
      cart_id:
        description: Identifier linking the order to its originating shopping cart
          session
      channel:
        description: Marketing channel through which the order was placed
        values: Email, Direct, Organic, Google, Meta, TikTok
      customer_id:
        description: Unique identifier for the customer who placed the order
      loyalty_tier:
        description: Customer's loyalty program tier at the time of order
        values: Bronze, Silver, Gold, Platinum
      order_date:
        description: Date the order was placed
      order_id:
        description: Unique identifier for each order
      order_status:
        description: Current status of the order
        values: delivered, shipped, refunded, cancelled, processing, pending
      payment_method:
        description: Method used to pay for the order
        values: card, klarna, paypal, apple_pay
      warehouse:
        description: Fulfillment warehouse responsible for processing the order
        values: Bayview, Riverside, Hillcrest, Lakeside
    description: This table records individual customer orders, capturing details
      about the order, customer, channel, payment, and fulfillment.
    grain: One row per order_id
  analytics.payments:
    auto_generated: true
    columns:
      amount_usd:
        caveats: Stored as HUGEINT; ensure precision handling in analytics
        description: Payment amount in US dollars
      attempt_no:
        caveats: May be used to distinguish retry attempts for the same order
        description: Sequential number indicating the order of payment attempts for
          a given order
      fraud_flag:
        description: Whether the payment attempt was flagged as potentially fraudulent
        values: False, True
      order_id:
        description: Identifier linking the payment to a specific order
      payment_id:
        description: Unique identifier for a payment attempt
      payment_method:
        description: Method used for the payment attempt
        values: card, klarna, paypal, apple_pay
      success:
        description: Whether the payment attempt was successful
        values: True, False
    description: Records individual payment attempts for orders, including payment
      method, success status, and fraud flag.
    grain: one row per payment attempt (identified by payment_id)
  analytics.products:
    auto_generated: true
    columns:
      brand:
        description: Brand name under which the product is sold
        values: Velvet, Noir, Hydra, Botanica, AuraBeaute, Pure Glow, Lumiere, Eclat
      category:
        description: Product category
        values: Makeup, Fragrance, Skincare, Tools, Haircare
      gift_message:
        description: Predefined gift message option available for the product
        values: Happy Birthday!
      is_organic:
        description: Whether the product is certified organic
        values: False, True
      launch_date:
        description: Date the product was launched
      list_price_usd:
        description: List price of the product in US dollars
      product_id:
        description: Unique identifier for each product
      product_name:
        description: Name of the product
        values: Brush Set Limited, Eau de Parfum Classic, Brush Set Sensitive, Shampoo
          Pro, Serum Pro, Foundation Limited, Serum Sensitive, Shampoo Sensitive,
          Foundation Classic, Eau de Parfum Pro, Eau de Parfum Limited, Foundation
          Pro, Shampoo Classic, Brush Set Classic, Serum Limited, Brush Set Pro, Shampoo
          Limited, Serum Classic, Foundation Sensitive, Eau de Parfum Sensitive
      shade:
        description: Shade or color variant of the product (e.g., for makeup or haircare)
        values: Caramel, Honey, Porcelain, Ivory, Espresso, Sand
      unit_cogs_usd:
        description: Cost of goods sold per unit in US dollars
    description: Product catalog for a beauty and personal care brand, containing
      details about each product including pricing, category, and attributes.
    grain: one row per product_id
  analytics.refunds:
    auto_generated: true
    columns:
      logistics_related:
        description: Whether the refund was caused by a logistics issue (e.g., shipping,
          delivery)
        values: False, True
      order_id:
        description: Identifier of the original order associated with the refund
      refund_amount_usd:
        description: Total refund amount in US dollars
      refund_completed_date:
        description: Date the refund was finalized/completed
      refund_id:
        description: Unique identifier for each refund record
      refund_reason:
        description: Customer-provided or system-assigned reason for the refund
        values: Scent too strong, Changed mind, Shade mismatch, Allergic reaction,
          Damaged in transit, Late delivery
    description: Records of customer refunds processed, including details about the
      reason, logistics involvement, and financial impact.
    grain: one row per refunded order (i.e., one refund record per order that was
      refunded)
