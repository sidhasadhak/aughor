tables:
  customers:
    description: 'Master customer list. One row per customer account. Use for all
      segment and region breakdowns — do not re-derive these from other tables.

      '
    grain: one row per customer_id
    joins:
    - JOIN daily_revenue ON customers.customer_id = daily_revenue.customer_id
    - JOIN kpi_daily ON customers.region = kpi_daily.region AND customers.segment
      = kpi_daily.segment
    columns:
      customer_id:
        description: Surrogate key — unique identifier for every customer account
      segment:
        description: Customer size tier assigned at account creation
        values: SMB, Enterprise
        caveats: Segment is assigned once and never changes — do not use as a proxy
          for ARR
      region:
        description: Geographic sales region
        values: APAC, EMEA, NA
      signup_date:
        description: Date the customer account was first created (UTC)
  daily_revenue:
    description: 'Transactional revenue log. One row per payment attempt per customer
      per day. This is the source of truth for revenue and payment failure analysis.
      Aggregate with SUM(amount) and filter status = ''success'' for recognised revenue.

      '
    grain: one row per (customer_id, date, payment_id)
    joins:
    - JOIN customers ON daily_revenue.customer_id = customers.customer_id
    columns:
      customer_id:
        description: Foreign key to customers table
        caveats: customer_id alone is not a stable trace identifier—must be combined
          with date to form a composite trace_id, as individual customer_id appears
          in 90 rows (one per date) despite only 800 unique customers.
      date:
        description: Calendar date of the payment attempt (UTC, date only — no time
          component)
      amount:
        description: Payment amount in USD. Includes all successful and failed attempts.
        caveats: Do NOT sum amount without filtering status = 'success' — failed rows
          inflate revenue figures
      status:
        description: Outcome of the payment attempt
        values: success, failed
        caveats: 'Failed rows are real attempts that were declined. Payment failure
          rate = COUNT(*) FILTER (WHERE status = ''failed'') / COUNT(*). A spike in
          failed rows is a leading indicator of a gateway or card issue.

          '
  events:
    description: 'Business event calendar. One row per notable event (outages, promotions,
      holidays, product launches) that may explain metric movements. Always check
      this table when investigating anomalies before concluding a root cause.

      '
    grain: one row per event_id (an event may span multiple dates via start_date/end_date)
    columns:
      event_type:
        description: Category of the business event
        values: outage, promotion, holiday, product_launch
      event_date:
        description: Date the event occurred or started (UTC)
      description:
        description: Free-text human-readable description of the event
      impact:
        description: 'Expected directional impact on revenue. Values: positive (promotion/launch),
          negative (outage), neutral (holiday — varies by region)

          '
      event_id:
        caveats: event_id has only 3 distinct values across all rows and cannot support
          cross-table tracing or segmentation due to severely limited coverage of
          business events.
  kpi_daily:
    description: 'Pre-aggregated daily KPI summary by region and customer segment.
      Use this table for trend queries and period-over-period comparisons — it is
      much faster than aggregating daily_revenue directly. Do not use for payment
      failure analysis (status not available here).

      '
    grain: one row per (date, region, segment, metric)
    joins:
    - JOIN customers ON kpi_daily.region = customers.region AND kpi_daily.segment
      = customers.segment
    columns:
      date:
        description: Calendar date (UTC)
      region:
        description: Geographic sales region (matches customers.region)
        values: APAC, EMEA, NA
      segment:
        description: Customer size tier (matches customers.segment)
        values: SMB, Enterprise
      metric:
        description: Name of the KPI being reported
        values: revenue, churn_count, new_customers, payment_failure_rate
      value:
        description: Numeric value of the metric for this (date, region, segment)
          combination
        caveats: 'revenue values are in USD and represent successfully collected amounts
          only. payment_failure_rate is a ratio (0.0–1.0), not a percentage.

          '
      composite_key(date,region,segment,metric):
        caveats: The composite_key is not a physical column but a derived concatenation—analysts
          must reconstruct it identically to join or filter correctly.
  customer:
    description: Contains core customer demographic and location data. Maps orders
      to stable customer identities and geographic locations.
    grain: One row per order-session — customer_id is a per-order UUID hash that changes
      each order. Use customer_unique_id for stable cross-order customer identity.
    auto_generated: true
    columns:
      customer_id:
        description: Per-order UUID hash assigned at order creation. NOT a stable
          customer identifier — a single real customer has a different customer_id
          for each order they place.
        caveats: NEVER use customer_id to count unique customers or identify repeat
          purchasers — it is unique per order, not per person. Use customer_unique_id
          for any repeat/returning customer analysis.
      customer_unique_id:
        description: Stable identifier for the real human customer across all their
          orders. Use this for repeat purchase analysis, retention cohorts, and any
          query that needs to recognise the same person across multiple orders.
        caveats: 96,096 distinct values vs 99,441 orders — meaning ~3,345 orders are
          from repeat customers. Always join on this column, not customer_id, when
          counting unique customers or building retention metrics.
      customer_zip_code_prefix:
        description: First 3–5 digits of the customer's ZIP/postal code, used for
          geographic aggregation.
      customer_city:
        description: Name of the city where the customer resides.
      customer_state:
        description: Two-letter abbreviation of the state or province where the customer
          resides.
        values: AC, AL, AM, AP, BA, CE, DF, ES, GO, MA, MG, MS, MT, PA, PB, PE, PI,
          PR, RJ, RN, RO, RR, RS, SC, SE, SP, TO
        caveats: Values follow Brazilian state abbreviations; likely reflects a Brazilian
          e-commerce context.
  order_items:
    description: This table stores individual items within orders, capturing the products
      purchased, their sellers, and associated pricing and shipping details.
    grain: One row per unique order item, representing a single product line within
      an order
    auto_generated: true
    columns:
      order_id:
        description: Unique identifier for the order to which this item belongs
      order_item_id:
        description: Sequential index of this item within its order (e.g., 1 for first
          item, 2 for second, etc.)
      product_id:
        description: Unique identifier for the product in this order item
      seller_id:
        description: Unique identifier for the seller who fulfilled this order item
      shipping_limit_date:
        description: Deadline by which the seller must ship this item (stored as ISO
          8601 string)
        values: e.g., '2017-09-15T10:00:00', '2017-10-02T12:30:00'
      price:
        description: Unit price of the product for this order item (excluding freight).
          This is the primary sales/revenue column — SUM(price) = total sales value.
      freight_value:
        description: Shipping cost allocated to this specific order item
  order_payments:
    description: Stores payment details for each order, capturing how payments were
      split across installments and payment methods.
    grain: One row per payment method installment for an order (i.e., an order may
      have multiple rows if paid with multiple methods or multiple installments).
    auto_generated: true
    columns:
      order_id:
        description: Unique identifier for the order being paid.
        caveats: order_id in order_payments must match exactly with orders.order_id;
          any mismatch (e.g., due to type casting or truncation) would cause incorrect
          joins and inflated/deflated order totals.
      payment_sequential:
        description: Sequential number indicating the order of this payment installment
          within the same order (e.g., 1 for first installment, 2 for second, etc.).
      payment_type:
        description: Method used for the payment (e.g., credit card, boleto, voucher).
        values: credit_card, boleto, voucher, cash
        caveats: payment_type is used to infer primary payment method per customer,
          but the analysis assumes one payment type per customer is 'primary' based
          on frequency—this may misrepresent customers with mixed or ambiguous usage
          patterns.
      payment_installments:
        description: Number of installments chosen for this payment (e.g., 1 for single
          payment, 12 for 12-month financing).
        caveats: May be 0 or 1 for non-installment payments; values >1 indicate installment
          plans.
      payment_value:
        description: Monetary amount paid in this installment (in local currency).
        caveats: Sum of payment_value across all rows for a given order_id should
          equal the order's total value.
  order_reviews:
    description: Customer reviews for orders, capturing feedback including scores,
      comments, and timestamps for when reviews were submitted and responded to.
    grain: One row per customer review, uniquely identified by review_id and linked
      to a specific order_id
    auto_generated: true
    columns:
      review_id:
        description: Unique identifier for each review
      order_id:
        description: Identifier of the order being reviewed
      review_score:
        description: Numerical rating given by the customer (typically 1–5)
        values: 1, 2, 3, 4, 5
      review_comment_title:
        description: Short headline or summary of the review provided by the customer
      review_comment_message:
        description: Full text content of the customer's review
      review_creation_date:
        description: Date and time when the review was created/submitted
        caveats: Stored as character varying (string); likely in ISO 8601 or similar
          format, but may require parsing
      review_answer_timestamp:
        description: Date and time when the seller or platform responded to the review
        caveats: May be NULL if no response has been provided; stored as character
          varying (string)
  orders:
    description: This table records individual customer orders, including timestamps
      for purchase, approval, delivery to carrier, delivery to customer, and estimated
      delivery.
    grain: One row represents one unique order identified by order_id
    auto_generated: true
    columns:
      order_id:
        description: Unique identifier for each order
      customer_id:
        description: Per-order UUID hash — same value as customer.customer_id for
          this order. NOT a stable customer identifier.
        caveats: 'Do NOT use orders.customer_id to count unique customers or detect
          repeat purchasers. JOIN to customer.customer_unique_id instead: JOIN customer
          c ON o.customer_id = c.customer_id, then GROUP BY c.customer_unique_id.
          | customer_id in orders is a raw identifier that may not uniquely map to
          customer_unique_id in the customer table without explicit join validation—using
          customer_id directly could lead to duplicate or mismatched customer counts.'
      order_status:
        description: Current status of the order (e.g., delivered, shipped, canceled)
        values: delivered, shipped, canceled, approved, invoiced, processing, created,
          null
        caveats: Some rows may have NULL status; may reflect legacy or incomplete
          data
      order_purchase_timestamp:
        description: Timestamp when the customer placed the order
        caveats: Stored as string; format appears to be 'YYYY-MM-DD HH:MM:SS'
      order_approved_at:
        description: Timestamp when the order was approved (e.g., payment confirmed)
        caveats: May be NULL for orders that were never approved (e.g., canceled or
          unpaid)
      order_delivered_carrier_date:
        description: Timestamp when the order was handed over to the carrier
        caveats: May be NULL for orders not yet shipped or not using a carrier
      order_delivered_customer_date:
        description: Timestamp when the order was delivered to the customer
        caveats: May be NULL for orders not yet delivered
      order_estimated_delivery_date:
        description: Estimated delivery date provided by the seller or system
        caveats: May be NULL if no estimate was set; may differ from actual delivery
          date
  product_category_name_translation:
    description: Maps product category names from Portuguese to English, used to standardize
      or translate category labels across datasets.
    grain: One row per unique product category, with its Portuguese and English names.
    auto_generated: true
    columns:
      product_category_name:
        description: Portuguese name of the product category
      product_category_name_english:
        description: English translation of the product category name
  products:
    description: Contains product catalog information including identifiers, category,
      and physical attributes like size and weight.
    grain: One row per unique product_id
    auto_generated: true
    columns:
      product_id:
        description: Unique identifier for each product
      product_category_name:
        description: Name of the product's main category
      product_name_lenght:
        description: Number of characters in the product name
      product_description_lenght:
        description: Number of characters in the product description
      product_photos_qty:
        description: Number of photos associated with the product
      product_weight_g:
        description: Product weight in grams
      product_length_cm:
        description: Product length in centimeters
      product_height_cm:
        description: Product height in centimeters
      product_width_cm:
        description: Product width in centimeters
  sellers:
    description: Contains information about sellers registered in the platform, including
      their location details.
    grain: One row per unique seller
    auto_generated: true
    columns:
      seller_id:
        description: Unique identifier for a seller
      seller_zip_code_prefix:
        description: First 5 digits of the seller's postal code (Brazilian CEP prefix)
      seller_city:
        description: Name of the city where the seller is located
      seller_state:
        description: Two-letter abbreviation of the Brazilian state where the seller
          is located
        values: SP, RJ, MG, RS, PR, SC, BA, ES, GO, AM, CE, PA, PB, PE, PI, RN, SE,
          AL, DF, MT, MS, MA, TO, AP, RR, AC, RO, AC
  superstore:
    description: This table contains detailed transaction-level records from a retail
      superstore, capturing order, customer, product, and financial information for
      each sale.
    grain: One row represents one line item in a customer order (i.e., one product
      purchased in one order)
    auto_generated: true
    columns:
      Row ID:
        description: Unique identifier for each row/line item in the dataset
      Order ID:
        description: Unique identifier for the order (may span multiple line items)
      Order Date:
        description: Date the order was placed by the customer
      Ship Date:
        description: Date the order was shipped to the customer
      Ship Mode:
        description: Shipping method selected by the customer
        values: First Class, Second Class, Standard Class, Same Day
      Customer ID:
        description: Unique identifier for the customer
      Customer Name:
        description: Full name of the customer
      Segment:
        description: Customer segment classification
        values: Consumer, Corporate, Home Office
      Country:
        description: Country of the customer's shipping address
      City:
        description: City of the customer's shipping address
      State:
        description: State or province of the customer's shipping address
      Postal Code:
        description: Postal or ZIP code of the customer's shipping address
      Region:
        description: Geographic region of the customer
        values: East, Central, West, South
      Product ID:
        description: Unique identifier for the product
      Category:
        description: High-level product category
        values: Furniture, Office Supplies, Technology
      Sub-Category:
        description: Specific sub-category within the product category
      Product Name:
        description: Full name/title of the product
      Sales:
        description: Total sales revenue for this line item (Quantity × Unit Price)
      Quantity:
        description: Number of units sold in this line item
      Discount:
        description: Discount applied to the line item (as a decimal fraction, e.g.,
          0.2 = 20% discount)
      Profit:
        description: Profit earned on this line item (Sales − Cost)
  attribution:
    description: This table stores marketing attribution data, assigning credit weights
      to different touchpoints (e.g., ads, email) for each order to understand marketing
      channel effectiveness.
    grain: One row per touchpoint contributing to an order, with the assigned weight
      of that touchpoint’s contribution to the order.
    auto_generated: true
    columns:
      order_id:
        description: Unique identifier for the order being attributed.
      touchpoint_type:
        description: Type of marketing touchpoint that contributed to the order (e.g.,
          ad impression, email click).
        values: ad_impression, organic, ad_click, email, influencer
      weight:
        description: Numerical weight representing the contribution of this touchpoint
          to the order (e.g., share of credit in a multi-touch model).
        caveats: Weights for a given order should sum to 1.0 across all touchpoints
          if using a normalized attribution model.
  campaigns:
    description: This table stores metadata for marketing campaigns, including their
      channel, objective, timing, budget, and targeting details.
    grain: One row per unique campaign_id
    auto_generated: true
    columns:
      campaign_id:
        description: Unique identifier for the campaign
      channel:
        description: Marketing channel through which the campaign is run
        values: Google, Affiliate, Meta, YouTube, Email, TikTok
      objective:
        description: Primary marketing goal of the campaign
        values: RETARGETING, CONVERSIONS, AWARENESS
      start_date:
        description: Date the campaign began
      end_date:
        description: Date the campaign ended or is scheduled to end
      daily_budget_usd:
        description: Allocated daily budget for the campaign in US dollars
      target_region:
        description: Geographic region targeted by the campaign
      creative_type:
        description: Format or type of creative assets used in the campaign (e.g.,
          image, video, text)
  cart_items:
    description: Tracks individual items added to shopping carts, linking carts to
      specific products (SKUs) with quantities and timestamps.
    grain: One row represents one SKU added to one cart (i.e., a single line item
      in a cart)
    auto_generated: true
    columns:
      cart_item_id:
        description: Unique identifier for the cart item record
      cart_id:
        description: Identifier of the cart to which this item belongs
      sku_id:
        description: Identifier of the product (SKU) added to the cart
      quantity:
        description: Number of units of the SKU added to the cart in this item
      added_ts:
        description: Timestamp when the item was added to the cart
  carts:
    description: This table captures individual shopping cart events, representing
      the state of a user's cart at the time of creation, including session and user
      identifiers, technical context, and abandonment status.
    grain: One row per cart event, uniquely identified by cart_id
    auto_generated: true
    columns:
      cart_id:
        description: Unique identifier for a specific cart instance
      session_id:
        description: Identifier for the browsing session during which the cart was
          created
      anon_id:
        description: Anonymous user identifier, used to track behavior across sessions
          before login
      created_ts:
        description: Timestamp when the cart was created
        caveats: carts.created_ts is in seconds, but the query multiplies it by 1000
          assuming it's seconds-to-milliseconds conversion while impressions.ts is
          already in milliseconds—this double-conversion error breaks the time window
          join.
      currency:
        description: Currency code (e.g., USD, EUR) used for the cart
      traffic_source:
        description: Source channel through which the user arrived at the site (e.g.,
          organic, paid, direct)
      device_type:
        description: Type of device used to create the cart (e.g., mobile, desktop,
          tablet)
      abandoned:
        description: Flag indicating whether the cart was abandoned (1) or converted
          (0); stored as BIGINT instead of BOOLEAN
        values: 0, 1
        caveats: Stored as BIGINT (0/1) rather than boolean; may require casting in
          queries
  clicks:
    description: This table records individual click events that occurred after an
      impression, linking them to specific campaigns, anonymous users, and advertising
      platforms.
    grain: One row represents a single click event on an advertisement impression.
    auto_generated: true
    columns:
      impression_id:
        description: Unique identifier for the impression that preceded the click.
      campaign_id:
        description: Identifier for the advertising campaign associated with the click.
        values: CMP-<hex_string>
      anon_id:
        description: Anonymous user identifier, used to track user behavior without
          personally identifiable information.
        values: ANON-<hex_string>
      platform:
        description: Advertising platform where the impression and click occurred.
        values: Google, Affiliate, Email, Meta, TikTok
      ts:
        description: Unix timestamp (in milliseconds) when the impression occurred.
      viewable:
        description: Whether the impression was viewable (i.e., met viewability criteria
          such as being in-view for a minimum duration).
        values: true, false
      click_ts:
        description: Unix timestamp (in milliseconds) when the click occurred.
  experiment_assignments:
    description: Records which users were assigned to which experiment variants and
      when, used to track exposure for A/B testing analysis.
    grain: one row per user-experiment assignment
    auto_generated: true
    columns:
      anon_id:
        description: Anonymous user identifier, used to link assignments to user behavior
      experiment_id:
        description: Unique identifier for the experiment
      variant:
        description: Variant assigned to the user (control or treatment)
        values: control, treatment
      assignment_ts:
        description: Unix timestamp (milliseconds) when the user was assigned to the
          variant
      is_experiment_user:
        description: Flag indicating whether the user qualifies as an experiment user
          (1 = yes, 0 = no)
        values: 0, 1
  experiments:
    description: This table stores metadata for A/B testing experiments, including
      timing, traffic allocation, and hypothesis details.
    grain: One row per experiment, uniquely identified by experiment_id
    auto_generated: true
    columns:
      experiment_id:
        description: Unique identifier for the experiment
        values: EXP-0026, EXP-0034, EXP-0047, EXP-0070, EXP-0104, EXP-0115, EXP-0162,
          EXP-0163
      start_ts:
        description: Unix timestamp (milliseconds) when the experiment started
        caveats: May be NULL for experiments not yet launched
      end_ts:
        description: Unix timestamp (milliseconds) when the experiment ended or will
          end
        caveats: NULL for experiments still running
      traffic_allocation:
        description: Percentage of total traffic allocated to the experiment (e.g.,
          0.1 = 10%)
        caveats: Should be between 0 and 1; may be 0 for paused experiments
      variant_ratio:
        description: Proportional split between control and variant groups (e.g.,
          0.5 = 50/50 split)
        caveats: Assumes two-armed test; may not reflect actual traffic distribution
          if multi-armed
      hypothesis:
        description: Brief description of the hypothesis being tested
        values: homepage layout, recommendation ranking, free shipping threshold,
          discount threshold test, checkout UX change
  impressions:
    description: Records of ad impressions served across various digital advertising
      platforms, capturing which anonymous user saw which campaign on which platform
      at what time, and whether the impression was viewable.
    grain: One row per ad impression event
    auto_generated: true
    columns:
      impression_id:
        description: Unique identifier for each impression event
      campaign_id:
        description: Identifier for the advertising campaign that served the impression
        values: CMP-21585f68ef, CMP-5b4660f550, CMP-87422509cf, CMP-2ecb3b4388, CMP-ece4e4ff2b,
          CMP-ff8edaaf61, CMP-6c06d576f8, CMP-bef7c9dead
      anon_id:
        description: Anonymous user identifier, used to track behavior without personally
          identifiable information
        values: ANON-C9D450ADBA824598, ANON-ED6B7A7E9DA44CC7, ANON-155DBF9C47BC42A5,
          ANON-8E2D7FE1730B4121, ANON-B28E49245597402E, ANON-F7772ED6E3264758, ANON-48615C2E94414B9A,
          ANON-08BB768211C2463C
      platform:
        description: Digital advertising platform where the impression was served
        values: Google, TikTok, Affiliate, Email, Meta
      ts:
        description: Unix timestamp (in milliseconds) when the impression occurred
        caveats: Stored as BIGINT; ensure proper conversion to timestamp type in analysis
          | impressions.ts is stored in milliseconds since epoch, but the query incorrectly
          treats it as seconds when comparing to cart.created_ts (which is in seconds),
          causing timestamp misalignment that prevents matching impressions to carts.
      viewable:
        description: Whether the impression met viewability criteria (e.g., 50% of
          ad in view for 1+ second)
        values: true, false
  inventory_movements:
    description: Tracks individual inventory movements (changes in stock levels) across
      warehouses, recording the type of movement, quantity, timestamp, and associated
      SKU and warehouse identifiers.
    grain: One row represents a single inventory movement event for a specific SKU
      at a specific warehouse.
    auto_generated: true
    columns:
      movement_id:
        description: Unique identifier for each inventory movement record.
      sku_id:
        description: Identifier for the stock-keeping unit involved in the movement.
      movement_type:
        description: Category of the inventory movement, indicating how stock was
          added or removed.
        values: WAREHOUSE_TRANSFER, RETURN_INBOUND, DAMAGE_WRITE_OFF, CUSTOMER_ORDER,
          PURCHASE_INBOUND
      quantity:
        description: Number of units moved (positive for additions, negative for reductions,
          depending on business convention).
      timestamp:
        description: Exact time when the movement occurred, stored with nanosecond
          precision.
        caveats: Nanosecond precision may cause compatibility issues with systems
          expecting standard timestamp formats.
      warehouse_id:
        description: Identifier for the warehouse where the movement took place.
  inventory_snapshots:
    description: A point-in-time inventory snapshot table capturing stock levels for
      SKUs across warehouses at specific moments.
    grain: One row per SKU-warehouse combination at a specific snapshot timestamp
    auto_generated: true
    columns:
      snapshot_id:
        description: Unique identifier for each inventory snapshot event
        values: SNAP-<hexadecimal>
      snapshot_date:
        description: Timestamp when the inventory snapshot was taken
      sku_id:
        description: Unique identifier for the product SKU
        values: SKU-<hexadecimal>
      warehouse_id:
        description: Identifier for the warehouse where inventory is held
        values: WH-DE, WH-UK, WH-US-WEST, WH-US-EAST
      stock_level:
        description: Quantity of units available in stock at the time of snapshot
  invoices:
    description: This table contains invoice-level financial and status information
      linked to orders, including gross and net revenue, tax, discount, and invoice
      delay metrics.
    grain: One row per invoice, uniquely identified by order_id (each order has at
      most one invoice in this table)
    auto_generated: true
    columns:
      order_id:
        description: Unique identifier linking the invoice to its originating order
      invoice_delay_days:
        description: Number of days between the order creation date and the invoice
          issue date
      revenue_gross:
        description: Total revenue before tax and discounts
      tax:
        description: Tax amount applied to the invoice
      discount:
        description: Total discount amount applied to the invoice
      revenue_net:
        description: Final revenue after applying tax and discount (typically = revenue_gross
          + tax - discount)
      status:
        description: Current status of the invoice
        values: VOID, PAID, ISSUED
  journal_entries:
    description: This table stores individual journal entries used for financial accounting,
      capturing debits and credits associated with orders and general ledger accounts.
    grain: One row per journal entry, representing a single debit or credit transaction
      linked to an order and a general ledger account.
    auto_generated: true
    columns:
      entry_id:
        description: Unique identifier for each journal entry
      order_id:
        description: Reference to the order that triggered this journal entry
      account:
        description: General ledger account name involved in the entry (e.g., Revenue,
          Accounts Receivable)
        values: Revenue, Accounts Receivable
      amount:
        description: Absolute value of the transaction amount
      entry_type:
        description: Indicates whether the entry is a debit or credit (e.g., 'debit',
          'credit')
