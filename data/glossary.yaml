        description: Total revenue from this line item (quantity × sales_price), in
          local currency.
        values: Decimal values.
      cs_ext_wholesale_cost:
        description: Total cost to retailer for this line item (quantity × wholesale_cost),
          in local currency.
        values: Decimal values.
      cs_ext_list_price:
        description: Total list price for this line item (quantity × list_price),
          in local currency.
        values: Decimal values.
      cs_ext_tax:
        description: Total tax amount applied to this line item, in local currency.
        values: Decimal values.
      cs_coupon_amt:
        description: Total coupon discount applied to this line item, in local currency.
        values: Non-negative decimal values.
      cs_ext_ship_cost:
        description: Total shipping cost allocated to this line item, in local currency.
        values: Decimal values.
      cs_net_paid:
        description: Net amount paid by customer for this line item (ext_sales_price
          − coupon_amt), in local currency.
        values: Decimal values.
      cs_net_paid_inc_tax:
        description: Net amount paid including tax (net_paid + ext_tax), in local
          currency.
        values: Decimal values.
      cs_net_paid_inc_ship:
        description: Net amount paid including shipping (net_paid + ext_ship_cost),
          in local currency.
        values: Decimal values.
      cs_net_paid_inc_ship_tax:
        description: Net amount paid including both shipping and tax, in local currency.
        values: Decimal values.
      cs_net_profit:
        description: Profit for this line item (net_paid − ext_wholesale_cost − ext_ship_cost),
          in local currency.
        values: Can be negative (loss) or positive.
