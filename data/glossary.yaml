        description: Number of units sold in this line item.
        values: Positive integers only.
      cs_wholesale_cost:
        description: Cost per unit paid by the retailer to the supplier, in local
          currency.
        values: Decimal values representing unit cost.
      cs_list_price:
        description: Suggested retail price per unit before discounts, in local currency.
        values: Decimal values representing list price.
      cs_sales_price:
        description: Actual selling price per unit after discounts, in local currency.
        values: Decimal values representing final unit price.
