version: 2

updates:
  # Python — the lockfile is uv.lock, driven by pyproject.toml.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      python-minor-and-patch:
        update-types: ["minor", "patch"]

  # Frontend — npm, lockfile at web/package-lock.json.
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      npm-minor-and-patch:
        update-types: ["minor", "patch"]

  # Keep the CI actions current (checkout, setup-uv, setup-node).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
