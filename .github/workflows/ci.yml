name: CI

# Minimal gate (REC-07 / OPS-01): nothing ran the 2200+ tests on a change before
# this. Runs on every PR and on pushes to main. The test env is hermetic — all
# stores honour AUGHOR_*_DB overrides (REC-04) so CI never depends on real data.
on:
  pull_request:
    # Pure docs / data-file changes can't affect the tests, the build, or codegen,
    # so don't spend a run on them. paths-ignore skips a run only when *every*
    # changed file matches — a mixed commit (code + docs) still runs in full.
    paths-ignore:
      - '*.md'
      - '**/*.md'
      - 'docs/**'
      - '*.db'
      - '**/*.db'
      - 'LICENSE'
      - 'NOTICE'
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '**/*.md'
      - 'docs/**'
      - '*.db'
      - '**/*.db'
      - 'LICENSE'
      - 'NOTICE'
  # The full interpreter matrix runs weekly (and on demand) instead of on every
  # PR — see the `python` matrix expression. Keeps the hot path ~3x cheaper while
  # still exercising 3.12/3.13 regularly.
  schedule:
    - cron: '0 6 * * 1'    # Mondays, 06:00 UTC
  workflow_dispatch:

# A newer push to the same branch/PR cancels the in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: nothing here writes to the repo. A compromised action in the
# dependency chain gets a read-only token.
permissions:
  contents: read

jobs:
  backend:
    name: Backend · pytest (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # pyproject declares requires-python = ">=3.11". The hot path (PRs and
        # pushes to main) tests only the 3.11 floor; the weekly `schedule` run and
        # a manual `workflow_dispatch` expand to the full set. The suite is green on
        # all three (verified locally, 2947 passed each); 3.12/3.13 rarely diverge
        # from 3.11 between weekly runs, so this drops the per-run cost ~3x without
        # giving up multi-version coverage.
        python: >-
          ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
              && fromJSON('["3.11","3.12","3.13"]')
              || fromJSON('["3.11"]') }}
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync dependencies (all extras, from the committed lock)
        # --python pins the interpreter deterministically without a committed
        # .python-version (that file is gitignored so devs can pick their own).
        run: uv sync --all-extras --frozen --python ${{ matrix.python }}
      - name: Run tests
        # Exclude the live-LLM suites (e2e ~100s/test, eval = accuracy ratchet).
        # Both need a real model + network and would hang/flake in CI.
        run: uv run --python ${{ matrix.python }} pytest -q -m "not e2e and not eval"

  frontend:
    name: Frontend · typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        # Strict install — no --legacy-peer-deps. A package.json `overrides` block pins
        # react/react-dom to a single version across the whole tree, so the @atlaskit/*
        # packages that still peer react ^18 (icon / skeleton / tile) resolve to the
        # app's react 19 instead of ERESOLVE-ing. (Keep the override versions in lockstep
        # with the react/react-dom deps if either is bumped — the `$react` self-ref form
        # is npm-11-only and CI runs node 20 / npm 10, so the versions are explicit.)
        run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Design-token gate
        # Blocking, baseline zero (REC-U1): no raw radius / pixel font-size in
        # components/ or app/ — the enforcement half of the 3-tier design layer,
        # same discipline as the backend ruff gate.
        run: npm run lint:tokens
      - name: Formatting gate
        # Blocking, baseline zero (REC-U8): number/date rendering routes through
        # lib/format.ts — no re-implemented toLocaleString / Intl.*Format in the UI.
        run: npm run lint:format
      - name: Raw-element ratchet
        # One-way ratchet (REC-U2): the raw-<button> count may only shrink. New
        # buttons use <Button> (components/ui/button); lower the baseline as the
        # existing ones are converted.
        run: npm run lint:elements
      - name: Production build
        # tsc --noEmit does not catch everything `next build` does (RSC boundary
        # violations, bad dynamic imports, prerender failures). A stranger's first
        # command after `npm install` is often `npm run build` — it must work.
        run: npm run build

  lint:
    name: Backend · ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Ruff check
        # Blocking gate: the baseline is zero (see [tool.ruff] in pyproject.toml).
        # Pinned so a newer ruff's stricter defaults can't fail CI without a
        # deliberate bump.
        run: uvx ruff@0.15.20 check .

  codegen:
    name: API client · codegen drift
    # The typed TS client (web/lib/api.gen.ts) is generated FROM the FastAPI
    # route surface. Before this gate it had silently fallen ~40 routes behind
    # (missing the whole /rbac, /jobs, /packs, /verify families). The dump is
    # offline + hermetic (scripts/dump_openapi.py isolates every store), so no
    # server is needed. openapi-typescript is version-pinned — a new release's
    # formatting changes must land as a deliberate regen, not a red gate.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --all-extras --frozen --python 3.11
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Regenerate typed client from the live route surface
        run: |
          uv run python scripts/dump_openapi.py openapi.ci.json
          npx -y openapi-typescript@7.13.0 openapi.ci.json -o web/lib/api.gen.ts
      - name: Fail on drift
        run: |
          if ! git diff --exit-code -- web/lib/api.gen.ts; then
            echo "::error::web/lib/api.gen.ts is stale — run 'npm run gen:api' in web/ and commit the result."
            exit 1
          fi
