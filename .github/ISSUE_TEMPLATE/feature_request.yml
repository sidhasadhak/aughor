name: Feature request
description: Suggest a capability or an improvement.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, it is worth skimming [ROADMAP.md](../../ROADMAP.md) — the
        idea may already be planned.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the situation, not the solution you have in mind.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What would you like Aughor to do?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: What have you tried or considered instead?

  - type: checkboxes
    id: contribute
    attributes:
      label: Would you be willing to work on this?
      options:
        - label: I'd be willing to open a pull request for it.
