<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <style>
      .bg{fill:#080b10}.rail{fill:#0d1117}.left{fill:#10161f}.bar{fill:#0f141b}.panel{fill:#101722;stroke:#263445;stroke-width:1}.panel2{fill:#0c1219;stroke:#202c3b;stroke-width:1}.sel{fill:#162337;stroke:#31506f}.chip{fill:#111b27;stroke:#2a3a4d}.code{fill:#080d13;stroke:#202c3b}
      .line{stroke:#243244;stroke-width:1}.dash{stroke:#3b526d;stroke-width:1;stroke-dasharray:5 7}.text{fill:#eef4fb}.soft{fill:#b9c5d4}.muted{fill:#8290a3}.faint{fill:#59697b}.blue{fill:#58a6ff}.teal{fill:#42d6b2}.green{fill:#62d889}.amber{fill:#f0b84d}.red{fill:#ff6675}.violet{fill:#a78bfa}
      .h1{font:600 24px Inter,Arial,sans-serif}.h2{font:600 16px Inter,Arial,sans-serif}.h3{font:600 13px Inter,Arial,sans-serif}.body{font:400 13px Inter,Arial,sans-serif}.small{font:500 11px Inter,Arial,sans-serif}.xs{font:600 10px Inter,Arial,sans-serif}.mono{font:500 12px ui-monospace,SFMono-Regular,Menlo,monospace}.num{font:650 28px ui-monospace,SFMono-Regular,Menlo,monospace}
    </style>
  </defs>
  <rect width="1440" height="900" class="bg"/><rect width="56" height="900" class="rail"/><rect x="56" width="300" height="900" class="left"/><rect x="356" width="1084" height="50" class="bar"/>
  <line x1="56" y1="0" x2="56" y2="900" class="line"/><line x1="356" y1="0" x2="356" y2="900" class="line"/><line x1="356" y1="50" x2="1440" y2="50" class="line"/>
  <rect x="16" y="18" width="24" height="24" rx="5" fill="#18283a" stroke="#31506f"/><circle cx="28" cy="30" r="5" class="blue"/>
  <text x="82" y="36" class="text h2">Investigations</text><text x="82" y="58" class="faint small">Evidence and hypotheses</text>
  <rect x="78" y="92" width="250" height="32" rx="5" fill="#0c1219" stroke="#263445"/><text x="96" y="113" class="faint body">Filter investigations</text>
  <rect x="78" y="154" width="250" height="76" rx="6" class="sel"/><text x="98" y="182" class="text h3">Payment failures increased</text><text x="98" y="204" class="blue small">running · 3 hypotheses</text>
  <rect x="78" y="244" width="250" height="64" rx="6" class="panel2"/><text x="98" y="272" class="muted h3">APAC retention slipped</text><text x="98" y="294" class="faint small">complete · 0.78 confidence</text>
  <rect x="78" y="322" width="250" height="64" rx="6" class="panel2"/><text x="98" y="350" class="muted h3">Margin recovery drivers</text><text x="98" y="372" class="faint small">complete · 0.84 confidence</text>

  <text x="382" y="32" class="muted body">Investigations / Payment failures increased</text>
  <text x="382" y="98" class="text h1">Why did payment failures increase last month?</text>
  <text x="382" y="126" class="muted body">Agentic investigation with cited SQL, confidence, and operational next actions.</text>
  <rect x="382" y="156" width="674" height="144" rx="8" class="panel"/>
  <text x="406" y="194" class="text h2">Current conclusion</text>
  <text x="406" y="224" class="soft body">Brazil card payments through Acquirer B explain most of the global lift in payment failure rate.</text>
  <text x="406" y="252" class="muted body">Confidence 0.91 · 3.4σ · based on 4 queries, 2 metric contracts, and 1 prior investigation.</text>
  <rect x="884" y="212" width="132" height="34" rx="5" fill="#152419" stroke="#31593b"/><text x="910" y="234" class="green small">Promote finding</text>

  <rect x="382" y="328" width="318" height="398" rx="8" class="panel"/>
  <text x="406" y="366" class="text h2">Hypothesis tree</text>
  <line x1="426" y1="402" x2="426" y2="684" class="dash"/>
  <circle cx="426" cy="420" r="7" class="green"/><text x="448" y="425" class="text h3">H1: Acquirer issue</text><text x="448" y="447" class="green small">confirmed · 0.91</text>
  <circle cx="426" cy="504" r="7" class="amber"/><text x="448" y="509" class="text h3">H2: Card mix shift</text><text x="448" y="531" class="amber small">partial · 0.43</text>
  <circle cx="426" cy="588" r="7" class="red"/><text x="448" y="593" class="text h3">H3: Retry policy</text><text x="448" y="615" class="red small">not primary · 0.22</text>
  <circle cx="426" cy="672" r="7" class="blue"/><text x="448" y="677" class="text h3">H4: Segment mix</text><text x="448" y="699" class="blue small">queued</text>

  <rect x="724" y="328" width="332" height="398" rx="8" class="panel"/>
  <text x="748" y="366" class="text h2">Evidence board</text>
  <rect x="748" y="394" width="284" height="74" rx="6" fill="#101c20" stroke="#28564d"/><text x="768" y="423" class="text h3">Strong support</text><text x="768" y="445" class="muted small">BR-card Acquirer B failure rate: 18.4%</text>
  <rect x="748" y="486" width="284" height="74" rx="6" fill="#131b28" stroke="#31506f"/><text x="768" y="515" class="text h3">Metric contract used</text><text x="768" y="537" class="muted small">payment_failure_rate v3, approved</text>
  <rect x="748" y="578" width="284" height="74" rx="6" fill="#1d1710" stroke="#654b22"/><text x="768" y="607" class="text h3">Open caveat</text><text x="768" y="629" class="muted small">Issuer outage data not connected yet</text>

  <rect x="1080" y="70" width="324" height="806" rx="0" class="panel2"/>
  <text x="1104" y="110" class="text h2">Evidence inspector</text>
  <text x="1104" y="138" class="muted body">Selected claim: Acquirer B explains lift</text>
  <text x="1104" y="190" class="faint xs">SQL</text>
  <rect x="1104" y="210" width="276" height="142" rx="6" class="code"/><text x="1122" y="238" class="blue mono">SELECT region, acquirer,</text><text x="1122" y="262" class="blue mono">  failed / attempts AS rate</text><text x="1122" y="286" class="blue mono">FROM payment_attempts</text><text x="1122" y="310" class="blue mono">GROUP BY 1,2</text>
  <text x="1104" y="398" class="faint xs">CITED ROWS</text>
  <text x="1104" y="430" class="muted mono">Brazil · Acquirer B · 18.4%</text>
  <text x="1104" y="458" class="muted mono">Brazil · Acquirer A · 7.1%</text>
  <text x="1104" y="486" class="muted mono">US · Acquirer B · 6.4%</text>
  <text x="1104" y="542" class="faint xs">ACTIONS</text>
  <rect x="1104" y="562" width="276" height="32" rx="5" class="sel"/><text x="1140" y="583" class="text small">Create action recommendation</text>
  <rect x="1104" y="610" width="276" height="32" rx="5" class="chip"/><text x="1140" y="631" class="soft small">Create monitor</text>
  <rect x="1104" y="658" width="276" height="32" rx="5" class="chip"/><text x="1140" y="679" class="soft small">Open metric contract</text>

  <rect x="382" y="754" width="674" height="78" rx="8" class="panel"/>
  <text x="406" y="798" class="muted body">Ask follow-up or refine:</text>
  <rect x="578" y="774" width="440" height="36" rx="6" fill="#0c1219" stroke="#36516f"/><text x="598" y="797" class="faint body">Compare with issuer outage logs once connected...</text>
</svg>
