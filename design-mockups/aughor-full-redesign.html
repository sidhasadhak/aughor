<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Aughor · Full-App Redesign (Interactive Prototype)</title>
<style>
/* ════════════════════════════════════════════════════════════════════════
   AUGHOR — FULL-APP REDESIGN PROTOTYPE
   Tokens mirror web/aughor-v2 (Blueprint blue on Databricks near-black).
   Every screen is redesigned around its real purpose. Mockup only — not wired
   to the backend. Click the sidebar, ⌘K, theme, rail, and "design notes".
   ════════════════════════════════════════════════════════════════════════ */
:root{
  --bg-0:#0A0D13; --bg-1:#0E121A; --bg-2:#141925; --bg-3:#1A2030; --bg-4:#232C3E;
  --bg-hover:rgba(255,255,255,.045); --bg-sel:rgba(59,130,246,.14);
  --b0:#11151D; --b1:#1B2130; --b2:#252E40; --b3:#334056; --bfocus:#3B82F6;
  --t1:#EAEDF3; --t2:#9BA6B8; --t3:#6B7689; --t4:#4A5468;
  --blue1:#11233F; --blue2:#1C3A66; --blue3:#3B82F6; --blue4:#5B9DFF; --blue5:#BFDBFF;
  --grn1:#0C2417; --grn3:#1FA968; --grn4:#34D399; --grn5:#86EFC0;
  --amb1:#2A1E05; --amb3:#D9A013; --amb4:#F5C542; --amb5:#FFE08A;
  --red1:#2A0F12; --red3:#E0444E; --red4:#F76B73; --red5:#FFA9AE;
  --vio1:#1B1340; --vio3:#7C5CE0; --vio4:#A285F5; --vio5:#CBB8FF;
  --cyn1:#06222E; --cyn3:#1AA0C4; --cyn5:#9BE4F7;
  --r1:4px; --r2:6px; --r3:10px; --r4:14px;
  --dur-fast:100ms; --dur-norm:200ms; --dur-slow:400ms; --dur-breath:700ms;
  --ease-out:cubic-bezier(0,0,.2,1); --ease-pop:cubic-bezier(.34,1.56,.64,1);
  --ease-spring:cubic-bezier(.16,1,.3,1);
  --shadow-sm:0 1px 4px rgba(0,0,0,.35); --shadow-md:0 4px 16px rgba(0,0,0,.45);
  --shadow-lg:0 8px 28px rgba(0,0,0,.5),0 2px 8px rgba(0,0,0,.4);
  --acc-glow:color-mix(in srgb,var(--blue3) 42%,transparent);
  --shadow-acc:0 4px 20px var(--acc-glow);
  --glass-bg:color-mix(in srgb,var(--bg-1) 72%,transparent);
  --sidebar:242px; --rail:62px; --topbar:52px;
  --font-ui:"DM Sans",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  --font-code:"IBM Plex Mono",Consolas,monospace;
}
[data-theme="light"]{
  --bg-0:#F6F8FC; --bg-1:#FFFFFF; --bg-2:#FFFFFF; --bg-3:#F1F4F9; --bg-4:#E6EBF2;
  --bg-hover:rgba(15,30,60,.04); --bg-sel:rgba(59,130,246,.10);
  --b0:#EEF1F6; --b1:#E3E8F0; --b2:#D5DCE6; --b3:#C2CBD9;
  --t1:#141925; --t2:#52607A; --t3:#7A879B; --t4:#A6B0C0;
  --glass-bg:color-mix(in srgb,#FFFFFF 72%,transparent);
  --shadow-sm:0 1px 3px rgba(20,40,80,.08); --shadow-md:0 4px 16px rgba(20,40,80,.10);
  --shadow-lg:0 10px 30px rgba(20,40,80,.12),0 2px 8px rgba(20,40,80,.06);
  --blue1:#E8F0FE; --grn1:#E6F6EE; --amb1:#FBF1DC; --red1:#FBE9EA; --vio1:#F0EBFB; --cyn1:#E4F4F9;
}
*,*::before,*::after{box-sizing:border-box}
html,body{height:100%;margin:0}
body{font-family:var(--font-ui);font-size:13px;background:var(--bg-0);color:var(--t1);line-height:1.5;-webkit-font-smoothing:antialiased;overflow:hidden}
button,input,select,textarea{font-family:inherit}
button{cursor:pointer;border:none;background:none;color:inherit}
:focus-visible{outline:2px solid var(--bfocus);outline-offset:2px;border-radius:var(--r1)}
::-webkit-scrollbar{width:7px;height:7px}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--b3)}
.mono{font-family:var(--font-code)}

/* ── App shell ─────────────────────────────────────────────────────────── */
.app{height:100vh;display:flex;flex-direction:column;overflow:hidden}
.body{flex:1;display:flex;overflow:hidden;min-height:0}

/* Topbar */
.topbar{height:var(--topbar);display:flex;align-items:center;gap:12px;padding:0 14px;background:var(--glass-bg);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-bottom:1px solid var(--b1);z-index:50;flex-shrink:0}
.brand{display:flex;align-items:center;gap:9px;font-weight:600;letter-spacing:.02em;font-size:14px}
.brand .glyph{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;background:linear-gradient(135deg,var(--blue3),var(--vio3));box-shadow:var(--shadow-acc);color:#fff;font-weight:700;font-size:14px}
.rail-toggle{width:30px;height:30px;border-radius:var(--r2);display:grid;place-items:center;color:var(--t2);transition:background var(--dur-fast),color var(--dur-fast)}
.rail-toggle:hover{background:var(--bg-hover);color:var(--t1)}
.cmdbar{flex:1;max-width:540px;margin:0 auto;height:34px;display:flex;align-items:center;gap:9px;padding:0 12px;border-radius:var(--r2);background:var(--bg-2);border:1px solid var(--b2);color:var(--t3);cursor:text;transition:border-color var(--dur-norm) var(--ease-spring),box-shadow var(--dur-norm) var(--ease-spring),background var(--dur-norm)}
.cmdbar:hover{border-color:var(--b3)}
.cmdbar .ph{flex:1;font-size:12.5px;text-align:left}
.kbd{font-family:var(--font-code);font-size:10.5px;color:var(--t2);border:1px solid var(--b2);border-bottom-width:2px;border-radius:var(--r1);padding:1px 6px;background:var(--bg-3)}
.topbar-right{display:flex;align-items:center;gap:6px;margin-left:auto}
.icon-btn{width:32px;height:32px;border-radius:var(--r2);display:grid;place-items:center;color:var(--t2);position:relative;transition:background var(--dur-fast),color var(--dur-fast),transform var(--dur-fast)}
.icon-btn:hover{background:var(--bg-hover);color:var(--t1)}
.icon-btn:active{transform:scale(.92)}
.icon-btn .badge{position:absolute;top:5px;right:5px;width:7px;height:7px;border-radius:50%;background:var(--red3);border:2px solid var(--bg-1)}
.avatar{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-weight:600;font-size:12px;background:linear-gradient(135deg,var(--grn3),var(--blue3));color:#fff;margin-left:4px}

/* Sidebar */
.sidebar{width:var(--sidebar);flex-shrink:0;display:flex;flex-direction:column;background:var(--bg-1);border-right:1px solid var(--b1);overflow:hidden;transition:width var(--dur-slow) var(--ease-spring);position:relative;z-index:40}
.app.rail .sidebar{width:var(--rail)}
.nav-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px 10px 4px}
.app.rail .nav-scroll{padding:10px 8px 4px}
.ask-launch{display:flex;align-items:center;gap:9px;width:100%;height:38px;padding:0 12px;margin-bottom:10px;border-radius:var(--r2);font-weight:600;font-size:12.5px;color:#fff;background:linear-gradient(135deg,var(--blue3),var(--blue4));box-shadow:var(--shadow-acc);transition:transform var(--dur-norm) var(--ease-spring),box-shadow var(--dur-norm) var(--ease-spring);overflow:hidden;white-space:nowrap}
.ask-launch:hover{transform:translateY(-1px);box-shadow:0 6px 24px var(--acc-glow)}
.ask-launch:active{transform:translateY(0) scale(.99)}
.app.rail .ask-launch{padding:0;justify-content:center}
.app.rail .ask-launch .lbl{opacity:0;width:0}
.nav-group{font-size:10.5px;font-weight:600;letter-spacing:.11em;text-transform:uppercase;color:var(--t4);padding:14px 11px 5px;white-space:nowrap}
.app.rail .nav-group{height:13px;padding:11px 0 0;color:transparent}
.app.rail .nav-group span{display:none}
.app.rail .nav-group::after{content:"";display:block;width:18px;height:1px;background:var(--b1);margin:0 auto}
.nav-item{display:flex;align-items:center;gap:11px;width:100%;height:34px;padding:0 11px;border-radius:var(--r2);font-size:12.5px;font-weight:450;color:var(--t2);position:relative;white-space:nowrap;transition:color var(--dur-fast)}
.nav-item:hover{color:var(--t1)}
.nav-item:hover::after{content:"";position:absolute;inset:0;border-radius:var(--r2);background:var(--bg-hover);z-index:0}
.nav-item .ic{flex-shrink:0;width:18px;height:18px;display:grid;place-items:center}
.app.rail .nav-item{justify-content:center;padding:0}
.app.rail .nav-item .lbl,.app.rail .nav-item .count{display:none}
.nav-item .count{margin-left:auto;font-size:10.5px;font-weight:600;color:var(--t3);background:var(--bg-3);border-radius:20px;padding:1px 7px;min-width:20px;text-align:center}
.nav-item.has-pulse .count{color:var(--amb5);background:var(--amb1)}
.nav-item.active{color:var(--blue5);font-weight:550}
#nav-pill{position:absolute;left:10px;right:10px;height:34px;border-radius:var(--r2);background:var(--bg-sel);pointer-events:none;z-index:0;transition:transform var(--dur-slow) var(--ease-spring),opacity var(--dur-norm)}
#nav-pill::before{content:"";position:absolute;left:-10px;top:50%;transform:translateY(-50%);width:3px;height:16px;border-radius:0 3px 3px 0;background:var(--blue3)}
.nav-item>*{position:relative;z-index:1}
.side-foot{border-top:1px solid var(--b1);padding:10px;display:flex;align-items:center;gap:9px;font-size:11.5px;color:var(--t2);white-space:nowrap;overflow:hidden}
.app.rail .side-foot{justify-content:center}
.app.rail .side-foot .foot-txt{display:none}

/* Screen + content */
.screen{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg-0);overflow:hidden}
.content-header{height:46px;flex-shrink:0;display:flex;align-items:center;gap:10px;padding:0 22px;border-bottom:1px solid var(--b1);background:var(--glass-bg);backdrop-filter:blur(12px);z-index:5}
.crumbs{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--t3)}
.crumbs .here{color:var(--t1);font-weight:600}
.crumbs .sep{color:var(--t4)}
.header-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
.content{flex:1;overflow-y:auto;overflow-x:hidden}
.pad{padding:22px}
.view{animation:viewIn var(--dur-slow) var(--ease-spring) both}
@keyframes viewIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.view h2{margin:0 0 4px;font-size:19px;font-weight:650;letter-spacing:-.01em}
.view .sub{color:var(--t2);font-size:13px;margin:0 0 18px;max-width:64ch}
.eyebrow{font-size:10.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--blue4);margin-bottom:6px;display:flex;align-items:center;gap:7px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;height:30px;padding:0 13px;border-radius:var(--r2);font-size:12px;font-weight:550;border:1px solid transparent;white-space:nowrap;transition:background var(--dur-fast),border-color var(--dur-fast),transform var(--dur-fast)}
.btn:active{transform:scale(.97)}
.btn.primary{background:var(--blue3);color:#fff}
.btn.primary:hover{background:var(--blue4)}
.btn.ghost{color:var(--t2);border-color:var(--b2)}
.btn.ghost:hover{background:var(--bg-hover);color:var(--t1);border-color:var(--b3)}
.btn.sm{height:25px;padding:0 9px;font-size:11px}
.btn.danger{color:var(--red5);border-color:transparent}
.btn.danger:hover{background:var(--red1)}

/* Cards / grid */
.grid{display:grid;gap:14px}
.g4{grid-template-columns:repeat(4,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g2{grid-template-columns:repeat(2,1fr)}
@media(max-width:1180px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}}
.card{background:var(--bg-2);border:1px solid var(--b1);border-radius:var(--r3);padding:16px;transition:transform var(--dur-norm) var(--ease-spring),box-shadow var(--dur-norm) var(--ease-spring),border-color var(--dur-norm)}
.card.lift{cursor:pointer}
.card.lift:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--b2)}
.card h3{margin:0;font-size:14px;font-weight:600}
.stat .k{font-size:10.5px;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;font-weight:600}
.stat .v{font-size:27px;font-weight:680;letter-spacing:-.02em;margin:6px 0 2px;font-variant-numeric:tabular-nums}
.stat .d{font-size:11.5px;color:var(--t2);display:flex;align-items:center;gap:5px}
.delta.up{color:var(--grn4)}.delta.dn{color:var(--red5)}

/* Tags / dots */
.tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:var(--r1);font-size:10.5px;font-weight:600;letter-spacing:.02em;white-space:nowrap}
.tag.blue{color:var(--blue5);background:var(--blue1)}.tag.grn{color:var(--grn5);background:var(--grn1)}
.tag.amb{color:var(--amb5);background:var(--amb1)}.tag.red{color:var(--red5);background:var(--red1)}
.tag.vio{color:var(--vio5);background:var(--vio1)}.tag.cyn{color:var(--cyn5);background:var(--cyn1)}
.tag.gray{color:var(--t2);background:var(--bg-3)}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;display:inline-block}
.dot.grn{background:var(--grn4)}.dot.amb{background:var(--amb4)}.dot.red{background:var(--red4)}.dot.blue{background:var(--blue4)}.dot.gray{background:var(--t3)}
.dot.live{background:var(--grn4);box-shadow:0 0 0 0 var(--grn4);animation:pulseDot 1.6s infinite}
@keyframes pulseDot{0%{box-shadow:0 0 0 0 color-mix(in srgb,var(--grn4) 55%,transparent)}70%{box-shadow:0 0 0 6px transparent}100%{box-shadow:0 0 0 0 transparent}}

/* Segmented control (in-view tabs) */
.seg{display:inline-flex;gap:2px;padding:3px;background:var(--bg-2);border:1px solid var(--b1);border-radius:var(--r2)}
.seg button{height:26px;padding:0 13px;border-radius:var(--r1);font-size:12px;font-weight:550;color:var(--t2);transition:color var(--dur-fast),background var(--dur-fast)}
.seg button:hover{color:var(--t1)}
.seg button.on{background:var(--bg-sel);color:var(--blue5)}

/* Lists / rows */
.row-list{display:flex;flex-direction:column;gap:1px}
.row{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:var(--r2);transition:background var(--dur-fast);cursor:pointer}
.row:hover{background:var(--bg-hover)}
.row .ti{font-weight:550;font-size:13px}
.row .mt{font-size:11.5px;color:var(--t3);margin-top:1px}
.row .rt{margin-left:auto;font-size:11px;color:var(--t3);font-variant-numeric:tabular-nums;white-space:nowrap}

/* Tables */
.dt{width:100%;border-collapse:collapse;font-size:12px}
.dt thead th{text-align:left;padding:8px 12px;font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);border-bottom:1px solid var(--b2);position:sticky;top:0;background:var(--bg-1);white-space:nowrap}
.dt tbody td{padding:9px 12px;border-bottom:1px solid var(--b0);font-variant-numeric:tabular-nums;color:var(--t1)}
.dt tbody tr{transition:background var(--dur-fast)}
.dt tbody tr:hover td{background:var(--bg-hover)}

/* Master-detail layout */
.md{display:flex;gap:0;height:calc(100vh - var(--topbar) - 46px)}
.md-list{width:320px;flex-shrink:0;border-right:1px solid var(--b1);overflow-y:auto;padding:14px}
.md-detail{flex:1;overflow-y:auto;padding:22px}
.md-row{padding:11px 12px;border-radius:var(--r2);cursor:pointer;transition:background var(--dur-fast);border:1px solid transparent}
.md-row:hover{background:var(--bg-hover)}
.md-row.sel{background:var(--bg-sel);border-color:var(--blue2)}
.md-row .ti{font-weight:550;font-size:12.5px}
.md-row .mt{font-size:11px;color:var(--t3);margin-top:2px}

/* Spark bars */
.spark{height:30px;display:flex;align-items:flex-end;gap:3px}
.spark i{width:6px;background:var(--blue3);border-radius:2px;opacity:.85;display:block}
.bar-h{display:flex;align-items:center;gap:9px;margin:5px 0;font-size:11.5px}
.bar-h .tk{width:96px;color:var(--t2);text-align:right;flex-shrink:0}
.bar-h .tr{flex:1;height:8px;background:var(--bg-3);border-radius:4px;overflow:hidden}
.bar-h .tr i{display:block;height:100%;border-radius:4px;background:var(--blue3)}
.bar-h .vl{width:42px;color:var(--t3);font-variant-numeric:tabular-nums}

/* Skeleton */
.sk{background:linear-gradient(90deg,var(--bg-2) 25%,var(--bg-3) 50%,var(--bg-2) 75%);background-size:200% 100%;animation:shim 1.4s infinite;border-radius:var(--r2)}
@keyframes shim{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Stagger reveal */
.stagger>*{animation:stagIn var(--dur-slow) var(--ease-spring) both}
.stagger>*:nth-child(1){animation-delay:.02s}.stagger>*:nth-child(2){animation-delay:.06s}.stagger>*:nth-child(3){animation-delay:.10s}.stagger>*:nth-child(4){animation-delay:.14s}.stagger>*:nth-child(5){animation-delay:.18s}.stagger>*:nth-child(6){animation-delay:.22s}.stagger>*:nth-child(7){animation-delay:.26s}.stagger>*:nth-child(8){animation-delay:.30s}
@keyframes stagIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

/* ── Investigation: thinking trace timeline ──────────────────────────── */
.trace{position:relative;padding-left:26px}
.trace::before{content:"";position:absolute;left:9px;top:6px;bottom:6px;width:2px;background:var(--b2)}
.tstep{position:relative;padding:8px 0;animation:stepIn .4s var(--ease-out) both}
@keyframes stepIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:none}}
.tstep .node{position:absolute;left:-21px;top:11px;width:14px;height:14px;border-radius:50%;background:var(--bg-2);border:2px solid var(--b3)}
.tstep.done .node{background:var(--grn3);border-color:var(--grn3)}
.tstep.run .node{border-color:var(--blue3);background:var(--blue1);animation:pulseDot 1.4s infinite}
.tstep .lab{font-size:12.5px;font-weight:550}
.tstep .meta{font-size:11px;color:var(--t3);margin-top:1px}
.tstep.run .lab{color:var(--blue5)}

/* Evidence / claim card */
.claim{border:1px solid var(--b1);border-radius:var(--r3);padding:13px 14px;background:var(--bg-2);margin-bottom:10px}
.conf-track{height:5px;border-radius:3px;background:var(--bg-3);overflow:hidden;margin-top:7px}
.conf-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--grn3),var(--grn4))}

/* Graph (ontology) placeholder */
.graph{position:relative;height:380px;border:1px solid var(--b1);border-radius:var(--r3);background:radial-gradient(circle at 50% 40%,var(--bg-2),var(--bg-1));overflow:hidden}
.gnode{position:absolute;display:flex;align-items:center;gap:7px;padding:7px 12px;border-radius:20px;background:var(--bg-3);border:1px solid var(--b2);font-size:12px;font-weight:550;box-shadow:var(--shadow-sm);transition:transform var(--dur-norm) var(--ease-spring)}
.gnode:hover{transform:scale(1.06);border-color:var(--blue3)}
.gnode.acc{border-color:var(--blue2);background:var(--blue1);color:var(--blue5)}
.gedge{position:absolute;height:2px;background:var(--b3);transform-origin:left center;opacity:.6}

/* Command palette */
.scrim{position:fixed;inset:0;background:rgba(4,7,12,.55);backdrop-filter:blur(3px);z-index:200;opacity:0;pointer-events:none;transition:opacity var(--dur-norm)}
.scrim.show{opacity:1;pointer-events:auto}
.palette{position:fixed;top:13vh;left:50%;transform:translateX(-50%) scale(.96) translateY(8px);width:min(640px,92vw);background:var(--bg-2);border:1px solid var(--b2);border-radius:14px;box-shadow:var(--shadow-lg);z-index:201;opacity:0;pointer-events:none;overflow:hidden;transition:opacity var(--dur-norm) var(--ease-spring),transform var(--dur-norm) var(--ease-spring)}
.palette.show{opacity:1;pointer-events:auto;transform:translateX(-50%) scale(1) translateY(0)}
.pal-input{display:flex;align-items:center;gap:11px;padding:15px 18px;border-bottom:1px solid var(--b1)}
.pal-input input{flex:1;background:none;border:none;outline:none;color:var(--t1);font-size:15px}
.pal-input input::placeholder{color:var(--t3)}
.pal-list{max-height:48vh;overflow-y:auto;padding:8px}
.pal-sec{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t4);padding:10px 12px 5px}
.pal-item{display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:var(--r2);font-size:13px;color:var(--t1)}
.pal-item .ic{color:var(--t3)}
.pal-item .hint{margin-left:auto;font-size:11px;color:var(--t3)}
.pal-item.sel{background:var(--bg-sel);color:var(--blue5)}
.pal-item.sel .ic{color:var(--blue4)}

/* Toast */

 home:'<button class="btn ghost">Customize</button><button class="btn primary" data-nav="chat">+ Ask</button>',
 chat:'<button class="btn ghost">Share</button><button class="btn ghost">Export</button>',

function renderView(id,keepScroll){
 const sc=content.scrollTop;
 const html=(VIEWS[id]||(()=>`<h2>${TITLES[id]||id}</h2><p class="sub">Screen mocked for navigation.</p>`))();
 const wrap=FULLBLEED.includes(id)?'view':'view pad';
 content.innerHTML=`<div class="${wrap}">${html}</div>`;
 if(keepScroll)content.scrollTop=sc;
 const sec=SECTION[id];
 crumbs.innerHTML=`<span>Aughor</span>`+(sec?`<span class="sep">/</span><span>${sec}</span>`:'')+`<span class="sep">/</span><span class="here">${TITLES[id]||id}</span>`;
 headerActions.innerHTML=ACTIONS[id]||ACTIONS.default;
}
function movePill(el){if(!el){pill.style.opacity='0';return}pill.style.opacity='1';pill.style.transform=`translateY(${el.offsetTop}px)`}
function navTo(id){
 current=id;
 document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.nav===id));
 movePill(document.querySelector(`.nav-item[data-nav="${id}"]`));
 if(document.startViewTransition)document.startViewTransition(()=>renderView(id));else renderView(id);
}
document.addEventListener('click',e=>{const t=e.target.closest('[data-nav]');if(t){navTo(t.dataset.nav);if(t.dataset.nav==='chat')toast('Started a new investigation');}});
renderView('home');
requestAnimationFrame(()=>movePill(document.querySelector('.nav-item[data-nav="home"]')));

document.getElementById('themeBtn').onclick=()=>{const h=document.documentElement,n=h.getAttribute('data-theme')==='dark'?'light':'dark';h.setAttribute('data-theme',n);document.getElementById('themeIco').innerHTML=n==='dark'?moon:sun;toast(n==='dark'?'Dark theme':'Light theme')};

/* command palette */
const scrim=document.getElementById('scrim'),palette=document.getElementById('palette'),palInput=document.getElementById('palInput'),palList=document.getElementById('palList');
const PAL=[{sec:'Actions',items:[{ic:'spark',label:'New investigation',hint:'↵',nav:'chat'},{ic:'db',label:'Browse catalog',nav:'catalog'},{ic:'node',label:'Open Intelligence Map',nav:'intelligence'},{ic:'alert',label:'Create a monitor',nav:'monitors'}]},{sec:'Go to',items:NAV.filter(n=>n.id).map(n=>({ic:n.icon,label:n.label,nav:n.id}))}];
function renderPal(q=''){q=q.toLowerCase();palList.innerHTML='';PAL.forEach(g=>{const items=g.items.filter(i=>i.label.toLowerCase().includes(q));if(!items.length)return;const s=document.createElement('div');s.className='pal-sec';s.textContent=g.sec;palList.appendChild(s);items.forEach(i=>{const el=document.createElement('div');el.className='pal-item';el.innerHTML=`<span class="ic">${svg(I[i.ic]||I.spark,17)}</span><span>${i.label}</span>`+(i.hint?`<span class="hint">${i.hint}</span>`:'');el.onclick=()=>{navTo(i.nav);closePal()};palList.appendChild(el)})});const f=palList.querySelector('.pal-item');if(f)f.classList.add('sel')}
function openPal(){scrim.classList.add('show');palette.classList.add('show');palInput.value='';renderPal();setTimeout(()=>palInput.focus(),40)}
function closePal(){scrim.classList.remove('show');palette.classList.remove('show')}
document.getElementById('cmdbarBtn').onclick=openPal;scrim.onclick=closePal;palInput.oninput=e=>renderPal(e.target.value);
palInput.onkeydown=e=>{const sel=palList.querySelector('.pal-item.sel'),all=[...palList.querySelectorAll('.pal-item')];if(e.key==='Enter'&&sel)sel.click();if(e.key==='ArrowDown'||e.key==='ArrowUp'){e.preventDefault();let i=all.indexOf(sel);i+=e.key==='ArrowDown'?1:-1;i=(i+all.length)%all.length;all.forEach(x=>x.classList.remove('sel'));all[i].classList.add('sel');all[i].scrollIntoView({block:'nearest'})}};
document.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'){e.preventDefault();palette.classList.contains('show')?closePal():openPal()}if(e.key==='Escape')closePal()});

/* toast */
const toastWrap=document.getElementById('toastWrap');
function toast(msg){const t=document.createElement('div');t.className='toast';t.innerHTML=`<span class="dot grn"></span> ${msg}`;toastWrap.appendChild(t);setTimeout(()=>{t.style.transition='opacity .3s,transform .3s';t.style.opacity='0';t.style.transform='translateY(8px)';setTimeout(()=>t.remove(),320)},2200)}

/* annotations */
document.getElementById('fab').onclick=function(){app.classList.toggle('annotate');this.querySelector('span').textContent=app.classList.contains('annotate')?'Hide design notes':'Show design notes'};
</script>
</body>
</html>
