<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <style>
      .bg{fill:#07090d}.side{fill:#0d1118}.top{fill:#0f141c}.panel{fill:#101722;stroke:#223044;stroke-width:1}.panel2{fill:#0c121a;stroke:#1c2a3d;stroke-width:1}.input{fill:#0d141e;stroke:#36516f;stroke-width:1.2}
      .muted{fill:#7f8da3}.soft{fill:#aab6c8}.text{fill:#edf3fb}.faint{fill:#54657a}.blue{fill:#5aa7ff}.teal{fill:#42d6b2}.amber{fill:#f2b84b}.red{fill:#ff6b74}.green{fill:#61d394}.line{stroke:#223044;stroke-width:1}.dash{stroke:#36516f;stroke-dasharray:5 7;stroke-width:1}
      .h1{font:600 25px Inter,Arial,sans-serif}.h2{font:600 17px Inter,Arial,sans-serif}.h3{font:600 14px Inter,Arial,sans-serif}.body{font:400 13px Inter,Arial,sans-serif}.small{font:500 11px Inter,Arial,sans-serif}.mono{font:500 12px ui-monospace,SFMono-Regular,Menlo,monospace}
    </style>
  </defs>
  <rect width="1440" height="900" class="bg"/>
  <rect x="0" y="0" width="244" height="900" class="side"/><rect x="244" y="0" width="1196" height="56" class="top"/>
  <line x1="244" y1="0" x2="244" y2="900" class="line"/><line x1="244" y1="56" x2="1440" y2="56" class="line"/>
  <text x="30" y="39" class="text h2">Aughor</text>
  <rect x="20" y="92" width="204" height="34" rx="6" fill="#152238" stroke="#29415e"/><text x="42" y="114" class="blue body">Ask</text>
  <text x="42" y="164" class="muted body">Investigations</text><text x="42" y="206" class="muted body">Intelligence</text><text x="42" y="248" class="muted body">Data Map</text><text x="42" y="290" class="muted body">Governance</text>

  <text x="286" y="116" class="text h1">Ask Aughor</text>
  <text x="286" y="144" class="muted body">Fast answers, agentic investigations, and cited evidence in one workspace.</text>
  <rect x="286" y="176" width="760" height="74" rx="10" class="input"/>
  <text x="312" y="207" class="soft body">Why did payment failures increase last month, and which segment should we fix first?</text>
  <rect x="312" y="222" width="76" height="22" rx="5" fill="#142235" stroke="#2a4764"/><text x="330" y="237" class="blue small">Quick</text>
  <rect x="398" y="222" width="96" height="22" rx="5" fill="#20162e" stroke="#493167"/><text x="419" y="237" class="soft small">Agentic</text>
  <rect x="964" y="205" width="56" height="30" rx="6" fill="#5aa7ff"/><text x="982" y="225" fill="#071018" class="small">Run</text>

  <rect x="1070" y="176" width="292" height="212" rx="10" class="panel"/>
  <text x="1094" y="214" class="text h2">Context pack</text>
  <text x="1094" y="242" class="muted body">Production warehouse</text>
  <text x="1094" y="268" class="muted body">Metric contract: payment failure rate</text>
  <text x="1094" y="294" class="muted body">Playbooks: 6 relevant</text>
  <text x="1094" y="320" class="muted body">Prior investigations: 4 similar</text>
  <text x="1094" y="346" class="muted body">Freshness: 14 minutes</text>

  <rect x="286" y="286" width="760" height="472" rx="10" class="panel"/>
  <text x="312" y="326" class="text h2">Investigation timeline</text>
  <text x="312" y="352" class="muted body">Each step is explicit, inspectable, and tied to evidence.</text>
  <line x1="336" y1="390" x2="336" y2="710" class="dash"/>
  <circle cx="336" cy="404" r="8" class="green"/><text x="362" y="409" class="text h3">Premise checked</text><text x="362" y="431" class="muted body">Payment failures increased from 6.8% to 9.1%, confirmed with approved metric SQL.</text>
  <circle cx="336" cy="494" r="8" class="blue"/><text x="362" y="499" class="text h3">Hypotheses generated</text><text x="362" y="521" class="muted body">Gateway outages, card mix shift, regional acquirer issues, and retry-policy changes.</text>
  <circle cx="336" cy="584" r="8" class="amber"/><text x="362" y="589" class="text h3">Evidence collection running</text><text x="362" y="611" class="muted body">Testing Brazil card payments by acquirer, bank, customer segment, and retry count.</text>
  <rect x="362" y="632" width="618" height="80" rx="8" fill="#0b1119" stroke="#1d2a3d"/>
  <text x="382" y="659" class="mono blue">SELECT region, payment_method, acquirer, failure_rate...</text>
  <text x="382" y="688" class="muted body">Rows: 412. Significant shift detected in BR-card-acquirer B, 3.4 sigma.</text>

  <rect x="1070" y="412" width="292" height="346" rx="10" class="panel"/>
  <text x="1094" y="450" class="text h2">Evidence board</text>
  <rect x="1094" y="476" width="244" height="72" rx="7" fill="#111d22" stroke="#26504a"/><text x="1114" y="505" class="teal h3">Strong signal</text><text x="1114" y="528" class="muted small">Brazil card failures explain 71% of total lift</text>
  <rect x="1094" y="562" width="244" height="72" rx="7" fill="#1f1710" stroke="#53401c"/><text x="1114" y="591" class="amber h3">Needs validation</text><text x="1114" y="614" class="muted small">Retry-policy change may amplify failures</text>
  <rect x="1094" y="648" width="244" height="72" rx="7" fill="#171019" stroke="#533040"/><text x="1114" y="677" class="red h3">Action candidate</text><text x="1114" y="700" class="muted small">Route BR-card traffic away from acquirer B</text>

  <rect x="286" y="782" width="1076" height="68" rx="10" class="panel2"/>
  <text x="312" y="823" class="soft body">Follow up:</text>
  <rect x="404" y="800" width="246" height="32" rx="6" fill="#101722" stroke="#24344a"/><text x="424" y="820" class="muted small">Create monitor from this finding</text>
  <rect x="666" y="800" width="242" height="32" rx="6" fill="#101722" stroke="#24344a"/><text x="686" y="820" class="muted small">Compare to prior month cohorts</text>
  <rect x="924" y="800" width="220" height="32" rx="6" fill="#101722" stroke="#24344a"/><text x="944" y="820" class="muted small">Draft action plan</text>
</svg>
