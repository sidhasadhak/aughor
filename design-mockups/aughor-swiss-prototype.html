<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Aughor · Swiss Redesign (Prototype)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════════════════════════════
   AUGHOR — SWISS / INTERNATIONAL TYPOGRAPHIC REDESIGN  ·  PROTOTYPE ONLY
   Discipline: one grotesque (Inter) + one mono (IBM Plex Mono). Monochrome
   ink on warm paper-white. A single signal accent (vermillion), used rarely.
   The grid, the rules, and the type carry the design — not colour or effects.
   ════════════════════════════════════════════════════════════════════════ */
:root{
  --paper:#F3F2EC; --surface:#FBFAF5; --surface-2:#ECEAE0; --sink:#E6E4D8;
  --ink:#1A1913; --ink-2:#54534A; --ink-3:#8A8979; --ink-4:#B3B1A2;
  --line:#E0DDD0; --line-2:#CFCBBA; --line-strong:#1A1913;
  --accent:#CF3A21; --accent-2:#A52E1A; --accent-tint:#F4E2DC;
  --pos:#1A1913; --neg:#CF3A21;            /* monochrome status: ink vs red */
  --sans:"Inter",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  --mono:"IBM Plex Mono",ui-monospace,Menlo,Consolas,monospace;
  --r1:3px; --r2:5px; --r3:8px;
  --topbar:54px; --sidebar:236px; --rail:60px;
  --gut:36px;
  --dur:160ms; --ease:cubic-bezier(.2,0,0,1);
}
[data-theme="dark"]{
  --paper:#16150F; --surface:#1D1C14; --surface-2:#26241A; --sink:#211F16;
  --ink:#F1EEE1; --ink-2:#A6A493; --ink-3:#777566; --ink-4:#54524A;
  --line:#2C2A1F; --line-2:#3B3930; --line-strong:#F1EEE1;
  --accent:#E5563E; --accent-2:#F0735E; --accent-tint:#33231C;
  --pos:#F1EEE1; --neg:#E5563E;
}
*,*::before,*::after{box-sizing:border-box}
html,body{height:100%;margin:0}
body{font-family:var(--sans);font-size:13px;background:var(--paper);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overflow:hidden;letter-spacing:-.005em}
button,input,select,textarea{font-family:inherit;font-size:inherit;color:inherit}
button{cursor:pointer;border:none;background:none}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:0}
::selection{background:var(--accent);color:#fff}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.mono{font-family:var(--mono);font-feature-settings:"tnum" 1}
.num{font-family:var(--mono);font-variant-numeric:tabular-nums}

/* Typographic primitives */
.eyebrow{font-family:var(--mono);font-size:10.5px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3)}
.kicker{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3)}
h1.display{font-size:34px;font-weight:600;letter-spacing:-.025em;line-height:1.08;margin:8px 0 0}
h2.head{font-size:19px;font-weight:600;letter-spacing:-.02em;margin:0}
.lede{font-size:14.5px;color:var(--ink-2);line-height:1.55;max-width:62ch;margin:10px 0 0;font-weight:400}
.sectitle{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);padding-bottom:10px;border-bottom:1px solid var(--line-strong);margin-bottom:2px}

/* App shell */
.app{height:100vh;display:flex;flex-direction:column;overflow:hidden;background:var(--paper)}
.body{flex:1;display:flex;overflow:hidden;min-height:0}

/* Topbar */
.topbar{height:var(--topbar);display:flex;align-items:center;gap:18px;padding:0 18px 0 16px;border-bottom:1px solid var(--line-strong);background:var(--paper);flex-shrink:0;z-index:30}
.brand{display:flex;align-items:baseline;gap:8px;font-weight:700;font-size:15px;letter-spacing:-.03em}
.brand .mk{width:22px;height:22px;background:var(--ink);color:var(--paper);display:grid;place-items:center;font-weight:700;font-size:13px;border-radius:2px;transform:translateY(3px)}
.brand sup{font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:var(--ink-3);font-weight:500}
.rail-toggle{width:30px;height:30px;display:grid;place-items:center;color:var(--ink-2);border-radius:var(--r1)}
.rail-toggle:hover{background:var(--surface-2)}
.cmdbar{flex:1;max-width:480px;margin:0 auto;height:33px;display:flex;align-items:center;gap:10px;padding:0 12px;border:1px solid var(--line-2);border-radius:var(--r2);background:var(--surface);color:var(--ink-3);cursor:text;transition:border-color var(--dur)}
.cmdbar:hover{border-color:var(--ink-3)}
.cmdbar .ph{flex:1;text-align:left;font-size:12.5px}
.kbd{font-family:var(--mono);font-size:10px;color:var(--ink-3);border:1px solid var(--line-2);border-radius:var(--r1);padding:1px 5px}
.top-right{margin-left:auto;display:flex;align-items:center;gap:4px}
.ibtn{width:32px;height:32px;display:grid;place-items:center;color:var(--ink-2);border-radius:var(--r1);position:relative;transition:background var(--dur)}
.ibtn:hover{background:var(--surface-2);color:var(--ink)}
.ibtn .dot-badge{position:absolute;top:6px;right:6px;width:6px;height:6px;border-radius:50%;background:var(--accent)}
.avatar{width:28px;height:28px;border-radius:50%;background:var(--ink);color:var(--paper);display:grid;place-items:center;font-weight:600;font-size:11px;margin-left:6px;font-family:var(--mono)}

/* Sidebar */
.sidebar{width:var(--sidebar);flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid var(--line-strong);background:var(--paper);overflow:hidden;transition:width var(--dur) var(--ease)}
.app.rail .sidebar{width:var(--rail)}
.nav-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px 12px}
.app.rail .nav-scroll{padding:14px 8px}
.ask{display:flex;align-items:center;gap:9px;width:100%;height:36px;padding:0 13px;margin-bottom:18px;background:var(--ink);color:var(--paper);font-weight:600;font-size:12.5px;border-radius:var(--r2);letter-spacing:-.01em;white-space:nowrap;overflow:hidden;transition:opacity var(--dur)}
.ask:hover{opacity:.88}
.app.rail .ask{padding:0;justify-content:center}
.app.rail .ask .lbl{display:none}
.nav-grp{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-4);padding:16px 11px 7px;white-space:nowrap}
.app.rail .nav-grp{height:14px;padding:12px 0 0;color:transparent}
.app.rail .nav-grp span{display:none}
.app.rail .nav-grp::after{content:"";display:block;width:16px;height:1px;background:var(--line-2);margin:0 auto}
.nav-item{position:relative;display:flex;align-items:center;gap:11px;width:100%;height:32px;padding:0 11px;font-size:12.5px;font-weight:500;color:var(--ink-2);white-space:nowrap;border-radius:var(--r2);transition:color var(--dur)}
.nav-item .ic{width:17px;height:17px;display:grid;place-items:center;flex-shrink:0;color:var(--ink-3);transition:color var(--dur)}
.nav-item:hover{color:var(--ink)}
.nav-item:hover .ic{color:var(--ink)}
.nav-item .count{margin-left:auto;font-family:var(--mono);font-size:10.5px;color:var(--ink-3)}
.app.rail .nav-item{justify-content:center;padding:0}
.app.rail .nav-item .lbl,.app.rail .nav-item .count{display:none}
.nav-item.active{color:var(--ink);font-weight:600}
.nav-item.active .ic{color:var(--accent)}
.nav-item>*{position:relative;z-index:1}
#pill{position:absolute;left:8px;right:8px;height:32px;background:var(--surface-2);border-radius:var(--r2);z-index:0;transition:transform var(--dur) var(--ease),opacity var(--dur);pointer-events:none}
#pill::before{content:"";position:absolute;left:0;top:7px;bottom:7px;width:2px;background:var(--accent)}
.app.rail #pill::before{display:none}
.side-foot{border-top:1px solid var(--line);padding:12px 16px;display:flex;align-items:center;gap:9px;font-family:var(--mono);font-size:10.5px;color:var(--ink-3);white-space:nowrap;overflow:hidden}
.app.rail .side-foot .ft{display:none}
.app.rail .side-foot{justify-content:center}

/* Screen */
.screen{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.chead{height:46px;flex-shrink:0;display:flex;align-items:center;gap:12px;padding:0 var(--gut);border-bottom:1px solid var(--line);background:var(--paper)}
.crumbs{font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--ink-3);display:flex;align-items:center;gap:8px}
.crumbs .here{color:var(--ink)}
.crumbs .sep{color:var(--ink-4)}
.chead-act{margin-left:auto;display:flex;gap:8px}
.content{flex:1;overflow-y:auto;overflow-x:hidden}
.pad{padding:var(--gut)}
.maxw{max-width:1080px}
.view{animation:fade var(--dur) var(--ease) both}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:7px;height:31px;padding:0 14px;font-size:12px;font-weight:600;letter-spacing:-.01em;border-radius:var(--r2);border:1px solid transparent;white-space:nowrap;transition:background var(--dur),border-color var(--dur),color var(--dur)}
.btn.ink{background:var(--ink);color:var(--paper)}
.btn.ink:hover{opacity:.88}
.btn.line{border-color:var(--line-2);color:var(--ink)}
.btn.line:hover{border-color:var(--ink);background:var(--surface)}
.btn.bare{color:var(--ink-2)}
.btn.bare:hover{color:var(--ink);background:var(--surface-2)}
.btn.sm{height:26px;padding:0 10px;font-size:11px}
.btn.acc{background:var(--accent);color:#fff}
.btn.acc:hover{background:var(--accent-2)}

/* Grid + ruled blocks */
.grid{display:grid;gap:0}
.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}.g2{grid-template-columns:repeat(2,1fr)}
@media(max-width:1180px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}}
.cols{display:grid;gap:var(--gut)}

/* KPI cell — Swiss number block, divided by rules not boxes */
.kpis{display:grid;border-top:1px solid var(--line-strong)}
.kpis.k4{grid-template-columns:repeat(4,1fr)}.kpis.k3{grid-template-columns:repeat(3,1fr)}.kpis.k2{grid-template-columns:repeat(2,1fr)}
.kpi{padding:18px 20px 18px 0;border-right:1px solid var(--line)}
.kpi:last-child{border-right:none}
.kpi .lab{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3)}
.kpi .val{font-family:var(--mono);font-size:30px;font-weight:500;letter-spacing:-.03em;margin:8px 0 3px;line-height:1}
.kpi .d{font-family:var(--mono);font-size:11px;color:var(--ink-3)}
.kpi .d.neg{color:var(--accent)}

/* Ruled list */
.rlist{border-top:1px solid var(--line-strong)}
.rrow{display:flex;align-items:center;gap:16px;padding:14px 4px;border-bottom:1px solid var(--line);cursor:pointer;transition:background var(--dur),padding var(--dur)}
.rrow:hover{background:var(--surface);padding-left:10px}
.rrow .idx{font-family:var(--mono);font-size:11px;color:var(--ink-4);width:22px;flex-shrink:0}
.rrow .ti{font-weight:500;font-size:13.5px;letter-spacing:-.01em}
.rrow .mt{font-family:var(--mono);font-size:10.5px;color:var(--ink-3);margin-top:2px;letter-spacing:.02em}
.rrow .rt{margin-left:auto;font-family:var(--mono);font-size:10.5px;color:var(--ink-3);white-space:nowrap;display:flex;align-items:center;gap:10px}
.chev{color:var(--ink-4);transition:transform var(--dur),color var(--dur)}
.rrow:hover .chev{transform:translateX(3px);color:var(--ink)}

/* Status marks (monochrome) */
.mk-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;display:inline-block;background:var(--ink)}
.mk-dot.alert{background:var(--accent)}
.mk-dot.idle{background:transparent;border:1.5px solid var(--ink-3)}
.mk-dot.live{background:var(--accent);animation:blink 1.5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.flag{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-2)}
.flag.alert{color:var(--accent)}

/* Chip / meta tag — outline, monochrome */
.chip{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-2);border:1px solid var(--line-2);border-radius:var(--r1);padding:2px 7px;white-space:nowrap}
.chip.acc{color:var(--accent);border-color:var(--accent)}
.chip.fill{background:var(--ink);color:var(--paper);border-color:var(--ink)}

/* Card — used sparingly; mostly we use ruled sections */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r3);padding:20px}
.frame{border:1px solid var(--line-strong);border-radius:var(--r3);overflow:hidden;background:var(--surface)}

/* Segmented = underline tabs */
.utabs{display:flex;gap:24px;border-bottom:1px solid var(--line)}
.utab{position:relative;padding:0 0 11px;font-size:12.5px;font-weight:500;color:var(--ink-3);letter-spacing:-.01em;transition:color var(--dur)}
.utab:hover{color:var(--ink)}
.utab.on{color:var(--ink);font-weight:600}
.utab.on::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--accent)}

/* Filters (text) */
.filterbar{display:flex;gap:18px;font-family:var(--mono);font-size:11px;letter-spacing:.04em}
.filterbar a{color:var(--ink-3);text-transform:uppercase;cursor:pointer;transition:color var(--dur);text-decoration:none;padding-bottom:3px;border-bottom:1.5px solid transparent}
.filterbar a:hover{color:var(--ink)}
.filterbar a.on{color:var(--ink);border-color:var(--accent)}

/* Table */
.dt{width:100%;border-collapse:collapse}
.dt thead th{text-align:left;padding:9px 14px 9px 0;font-family:var(--mono);font-size:9.5px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);border-bottom:1px solid var(--line-strong);white-space:nowrap}
.dt tbody td{padding:11px 14px 11px 0;border-bottom:1px solid var(--line);font-size:12.5px;vertical-align:middle}
.dt tbody td.num,.dt thead th.num{font-family:var(--mono);font-variant-numeric:tabular-nums}
.dt tbody tr:hover td{background:var(--surface)}
.dt .sql{font-family:var(--mono);font-size:11px;color:var(--ink-2);max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Master–detail */
.md{display:flex;height:calc(100vh - var(--topbar) - 46px)}
.md-l{width:330px;flex-shrink:0;border-right:1px solid var(--line-strong);overflow-y:auto;padding:24px}
.md-r{flex:1;overflow-y:auto;padding:32px 40px}
.mrow{padding:13px 12px;border-radius:var(--r2);cursor:pointer;border-left:2px solid transparent;transition:background var(--dur)}
.mrow:hover{background:var(--surface)}
.mrow.sel{background:var(--surface-2);border-left-color:var(--accent)}
.mrow .ti{font-weight:500;font-size:13px;letter-spacing:-.01em}
.mrow .mt{font-family:var(--mono);font-size:10px;color:var(--ink-3);margin-top:3px;letter-spacing:.03em}

/* Bars + mini chart */
.hbar{display:grid;grid-template-columns:120px 1fr 48px;align-items:center;gap:14px;padding:7px 0;font-family:var(--mono);font-size:11px}
.hbar .k{color:var(--ink-2);text-align:right;text-transform:uppercase;letter-spacing:.06em;font-size:10px}
.hbar .tr{height:6px;background:var(--surface-2)}
.hbar .tr i{display:block;height:100%;background:var(--ink)}
.hbar .v{color:var(--ink-3);text-align:right}
.spark{display:flex;align-items:flex-end;gap:4px;height:36px}
.spark i{flex:1;background:var(--ink-3);min-width:5px}
.spark i.hot{background:var(--accent)}

/* Timeline (investigation) */
.tl{border-left:1px solid var(--line-strong);margin-left:6px}
.tstep{position:relative;padding:2px 0 20px 26px}
.tstep::before{content:"";position:absolute;left:-5px;top:5px;width:9px;height:9px;border-radius:50%;background:var(--paper);border:1.5px solid var(--ink-3)}
.tstep.done::before{background:var(--ink);border-color:var(--ink)}
.tstep.run::before{border-color:var(--accent);background:var(--accent);animation:blink 1.4s infinite}
.tstep .n{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-4)}
.tstep .l{font-weight:500;font-size:13px;margin-top:2px;letter-spacing:-.01em}
.tstep.run .l{color:var(--accent)}
.tstep .m{font-family:var(--mono);font-size:10.5px;color:var(--ink-3);margin-top:3px;line-height:1.5}

/* Evidence */
.claim{border-bottom:1px solid var(--line);padding:14px 0}
.conf{height:3px;background:var(--surface-2);margin-top:9px}
.conf i{display:block;height:100%;background:var(--ink)}

/* Graph */
.graph{position:relative;height:360px;border:1px solid var(--line-strong);border-radius:var(--r3);background:var(--surface);background-image:radial-gradient(var(--line) 1px,transparent 1px);background-size:22px 22px;overflow:hidden}
.gn{position:absolute;display:flex;align-items:center;gap:7px;padding:7px 13px;background:var(--paper);border:1px solid var(--ink);font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.02em;border-radius:2px}
.gn.acc{background:var(--ink);color:var(--paper)}
.ge{position:absolute;height:1px;background:var(--ink-3);transform-origin:left center}

/* Command palette */
.scrim{position:fixed;inset:0;background:color-mix(in srgb,var(--ink) 28%,transparent);z-index:200;opacity:0;pointer-events:none;transition:opacity var(--dur)}
.scrim.show{opacity:1;pointer-events:auto}
.pal{position:fixed;top:14vh;left:50%;transform:translateX(-50%) translateY(6px);width:min(600px,92vw);background:var(--surface);border:1px solid var(--line-strong);border-radius:var(--r3);box-shadow:0 24px 60px color-mix(in srgb,var(--ink) 22%,transparent);z-index:201;opacity:0;pointer-events:none;overflow:hidden;transition:opacity var(--dur),transform var(--dur) var(--ease)}
.pal.show{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}
.pal-in{display:flex;align-items:center;gap:11px;padding:16px 18px;border-bottom:1px solid var(--line)}
.pal-in input{flex:1;background:none;border:none;outline:none;font-size:15px;letter-spacing:-.01em}
.pal-list{max-height:46vh;overflow-y:auto;padding:8px}
.pal-sec{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-4);padding:11px 12px 6px}
.pal-i{display:flex;align-items:center;gap:13px;padding:9px 12px;border-radius:var(--r2);font-size:13px}
.pal-i .ic{color:var(--ink-3)}
.pal-i .h{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--ink-4)}
.pal-i.sel{background:var(--surface-2)}
.pal-i.sel .ic{color:var(--accent)}

/* Toast */
.toasts{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:300;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{display:flex;align-items:center;gap:10px;padding:11px 16px;background:var(--ink);color:var(--paper);border-radius:var(--r2);font-size:12px;font-weight:500;animation:tin var(--dur) var(--ease) both}
.toast .mk-dot{background:var(--accent)}
@keyframes tin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* Design note (Swiss sidenote) */
.note{display:none;margin:0 0 26px;padding:0 0 0 16px;border-left:2px solid var(--accent)}
.note .nl{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:5px}
.note p{margin:0;font-size:12.5px;color:var(--ink-2);line-height:1.6;max-width:74ch}
.note b{color:var(--ink);font-weight:600}
.app.notes .note{display:block;animation:fade var(--dur) both}
.fab{position:fixed;bottom:24px;right:24px;z-index:130;height:38px;padding:0 16px;display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;font-weight:500;color:var(--paper);background:var(--ink);border-radius:var(--r2);transition:opacity var(--dur)}
.fab:hover{opacity:.88}
.app.notes .fab{background:var(--accent)}

.flex{display:flex}.ac{align-items:center}.jb{justify-content:space-between}.wrap{flex-wrap:wrap}
.g8{gap:8px}.g12{gap:12px}.g16{gap:16px}.g24{gap:24px}
.mt6{margin-top:6px}.mt10{margin-top:10px}.mt16{margin-top:16px}.mt24{margin-top:24px}.mt32{margin-top:32px}.mt40{margin-top:40px}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="app" id="app">
  <header class="topbar">

function line(data,w=460,h=150){
 const max=Math.max(...data),min=Math.min(...data),pad=10;
 const pts=data.map((d,i)=>[pad+i*((w-pad*2)/(data.length-1)),h-pad-((d-min)/(max-min||1))*(h-pad*2)]);
 const path=pts.map((p,i)=>`${i?'L':'M'}${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(' ');
 const last=pts[pts.length-1];
 return `<svg viewBox="0 0 ${w} ${h}" width="100%" style="display:block"><path d="${path}" fill="none" stroke="var(--ink)" stroke-width="1.5"/><circle cx="${last[0]}" cy="${last[1]}" r="3.5" fill="var(--accent)"/></svg>`;
}

<div class="flex jb ac">${head('Watchers','Monitors','Aughor watches your metrics and tells you when something breaks pattern.')}<div class="flex g8 ac"><div class="utabs" style="border:none;gap:16px">${['monitors','alerts'].map(x=>`<button class="utab ${t===x?'on':''}" onclick="setSub('monitors','${x}')">${x[0].toUpperCase()+x.slice(1)}${x==='alerts'?' · 2':''}</button>`).join('')}</div><button class="btn ink sm">+ New</button></div></div>
${t==='monitors'?`<table class="dt mt24"><thead><tr><th></th><th>Monitor</th><th>Type</th><th>Cadence</th><th>Recent</th><th>State</th></tr></thead><tbody>
${[['Refund rate','anomaly','hourly','on',[30,40,35,55,45,60,42]],['Net revenue vs target','threshold','daily','on',[60,58,55,52,50,48,46]],['Payment p95 latency','spike','every 15m','on',[20,22,21,25,30,55,80]],['Daily active users','drop','daily','off',[50,52,51,53,52,54,53]]].map(([n,ty,c,s,sp])=>`<tr><td><span class="mk-dot ${s==='on'?'live':'idle'}"></span></td><td><b>${n}</b></td><td><span class="chip">${ty}</span></td><td class="num" style="color:var(--ink-3)">${c}</td><td style="width:120px">${sparkEl(sp)}</td><td><span class="flag">${s}</span></td></tr>`).join('')}
</tbody></table>`:`<div class="rlist mt24">${[['HIGH','alert','Refund rate 4.1% > 2.5% threshold','12m'],['MED','','Payment p95 6.8s > 3s','1h']].map(([sev,m,t2,w])=>`<div class="rrow"><span class="kicker ${m==='alert'?'':''}" style="width:54px;color:${m==='alert'?'var(--accent)':'var(--ink-3)'}">${sev}</span><span class="mk-dot ${m}"></span><div style="flex:1"><div class="ti">${t2}</div><div class="mt">${w} ago</div></div><button class="btn line sm" data-nav="chat">Investigate</button><button class="btn ink sm">Acknowledge</button></div>`).join('')}</div>`}`;
};

<table class="dt mt16"><thead><tr><th>Time</th><th>Connection</th><th>Verdict</th><th>SQL</th><th class="num">Rows</th><th class="num">Dur</th><th class="num">PII</th></tr></thead><tbody>

/* ═══════════ engine ═══════════ */
const content=document.getElementById('content'),crumbs=document.getElementById('crumbs'),cact=document.getElementById('cact');
let current='home';
const FULL=['recents','catalog','playbook','settings'];
const ACT={home:'<button class="btn line sm">Customize</button><button class="btn ink sm" data-nav="chat">+ Ask</button>',chat:'<button class="btn bare sm">Share</button><button class="btn bare sm">Export</button>',def:'<button class="btn line sm">Share</button>'};
function renderView(id,keep){
 const sc=content.scrollTop;
 const html=(V[id]||(()=>`${head('','+'+(TITLES[id]||id))}<p class="lede">Screen mocked for navigation.</p>`))();
 const wrap=FULL.includes(id)?'view':'view pad maxw';
 content.innerHTML=`<div class="${wrap}">${html}</div>`;
 if(keep)content.scrollTop=sc;
 const sec=SECTION[id];
 crumbs.innerHTML=`<span>Aughor</span>`+(sec?`<span class="sep">/</span><span>${sec}</span>`:'')+`<span class="sep">/</span><span class="here">${TITLES[id]||id}</span>`;
 cact.innerHTML=ACT[id]||ACT.def;
}
function movePill(el){if(!el){pill.style.opacity='0';return}pill.style.opacity='1';pill.style.transform=`translateY(${el.offsetTop}px)`}
function navTo(id){current=id;document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.nav===id));movePill(document.querySelector(`.nav-item[data-nav="${id}"]`));if(document.startViewTransition)document.startViewTransition(()=>renderView(id));else renderView(id)}
document.addEventListener('click',e=>{const t=e.target.closest('[data-nav]');if(t){navTo(t.dataset.nav);if(t.dataset.nav==='chat')toast('Started a new investigation')}});
renderView('home');requestAnimationFrame(()=>movePill(document.querySelector('.nav-item[data-nav="home"]')));

const app=document.getElementById('app');
document.getElementById('railBtn').onclick=()=>{app.classList.toggle('rail');setTimeout(()=>movePill(document.querySelector('.nav-item.active')),60)};
const sun='<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>',moon='<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>';
document.getElementById('themeBtn').onclick=()=>{const h=document.documentElement,n=h.getAttribute('data-theme')==='light'?'dark':'light';h.setAttribute('data-theme',n);document.getElementById('themeIco').innerHTML=n==='dark'?sun:moon;toast(n==='dark'?'Dark · ink':'Light · paper')};

const scrim=document.getElementById('scrim'),pal=document.getElementById('pal'),palIn=document.getElementById('palIn'),palList=document.getElementById('palList');
const PAL=[{sec:'Actions',items:[{ic:'spark',label:'New investigation',hint:'↵',nav:'chat'},{ic:'db',label:'Browse catalog',nav:'catalog'},{ic:'node',label:'Open Intelligence Map',nav:'intelligence'},{ic:'alert',label:'Create a monitor',nav:'monitors'}]},{sec:'Go to',items:NAV.filter(n=>n.id).map(n=>({ic:n.icon,label:n.label,nav:n.id}))}];
function renderPal(q=''){q=q.toLowerCase();palList.innerHTML='';PAL.forEach(g=>{const items=g.items.filter(i=>i.label.toLowerCase().includes(q));if(!items.length)return;const s=document.createElement('div');s.className='pal-sec';s.textContent=g.sec;palList.appendChild(s);items.forEach(i=>{const el=document.createElement('div');el.className='pal-i';el.innerHTML=`<span class="ic">${svg(I[i.ic]||I.spark,16)}</span><span>${i.label}</span>`+(i.hint?`<span class="h">${i.hint}</span>`:'');el.onclick=()=>{navTo(i.nav);closePal()};palList.appendChild(el)})});const f=palList.querySelector('.pal-i');if(f)f.classList.add('sel')}
function openPal(){scrim.classList.add('show');pal.classList.add('show');palIn.value='';renderPal();setTimeout(()=>palIn.focus(),40)}
function closePal(){scrim.classList.remove('show');pal.classList.remove('show')}
document.getElementById('cmdBtn').onclick=openPal;scrim.onclick=closePal;palIn.oninput=e=>renderPal(e.target.value);
palIn.onkeydown=e=>{const sel=palList.querySelector('.pal-i.sel'),all=[...palList.querySelectorAll('.pal-i')];if(e.key==='Enter'&&sel)sel.click();if(e.key==='ArrowDown'||e.key==='ArrowUp'){e.preventDefault();let i=all.indexOf(sel);i+=e.key==='ArrowDown'?1:-1;i=(i+all.length)%all.length;all.forEach(x=>x.classList.remove('sel'));all[i].classList.add('sel');all[i].scrollIntoView({block:'nearest'})}};
document.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'){e.preventDefault();pal.classList.contains('show')?closePal():openPal()}if(e.key==='Escape')closePal()});

const toasts=document.getElementById('toasts');
function toast(m){const t=document.createElement('div');t.className='toast';t.innerHTML=`<span class="mk-dot"></span> ${m}`;toasts.appendChild(t);setTimeout(()=>{t.style.transition='opacity .25s,transform .25s';t.style.opacity='0';t.style.transform='translateY(8px)';setTimeout(()=>t.remove(),260)},2000)}

document.getElementById('fab').onclick=function(){app.classList.toggle('notes');this.querySelector('span').textContent=app.classList.contains('notes')?'Hide notes':'Design notes'};
</script>
